<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin PreetyTaxi - Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-top: 5px solid #ffc107; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; margin: 2px; }
        .btn-on { background: #28a745; color: white; }
        .btn-off { background: #dc3545; color: white; }
        .btn-semanal { background: #000; color: #ffc107; padding: 15px; width: 100%; font-size: 16px; margin-top: 20px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .bg-activo { background: #e8f5e9; color: #2e7d32; }
        .bg-bloqueado { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Panel Administrativo 🚖</h2>
        <p>Control de Conductores y Comisiones</p>
        <div style="display:flex; justify-content: space-around; font-size: 20px; font-weight: bold;">
            <div>Comisión Total: <span id="b-comi" style="color:red">B/. 0.00</span></div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Conductor</th>
                <th>Placa</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="lista-conductores">
            </tbody>
    </table>

    <button class="btn btn-semanal" onclick="cierreSemanal()">
        <i class="fas fa-sync-alt"></i> EJECUTAR CIERRE SEMANAL (RESET)
    </button>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
            databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function cargarConductores() {
            db.ref('conductores').on('value', snapshot => {
                const tbody = document.getElementById('lista-conductores');
                tbody.innerHTML = "";
                let tComi = 0;

                snapshot.forEach(child => {
                    const d = child.val();
                    const idConductor = child.key;
                    const esBloqueado = d.estado === 'bloqueado';
                    tComi += parseFloat(d.deuda || 0);

                    tbody.innerHTML += `
                    <tr>
                        <td>
                            <b>${d.nombre}</b><br>
                            <small>${d.celular}</small>
                        </td>
                        <td>${d.placa}</td>
                        <td>
                            <span class="status-badge ${esBloqueado ? 'bg-bloqueado' : 'bg-activo'}">
                                ${d.estado.toUpperCase()}
                            </span>
                        </td>
                        <td>
                            <button class="btn ${esBloqueado ? 'btn-on' : 'btn-off'}" onclick="toggleConductor('${idConductor}', '${d.estado}')">
                                ${esBloqueado ? 'ACTIVAR' : 'BLOQUEAR'}
                            </button>
                            <button class="btn btn-on" style="background:#007bff" onclick="resetDeuda('${idConductor}', '${d.placa}')">
                                PAGÓ (RESET)
                            </button>
                        </td>
                    </tr>`;
                });
                document.getElementById('b-comi').innerText = "B/. " + tComi.toFixed(2);
            });
        }

        function toggleConductor(id, est) { 
            const nuevoEstado = (est === 'bloqueado') ? 'activo' : 'bloqueado';
            db.ref('conductores/' + id).update({ estado: nuevoEstado }); 
        }

        function resetDeuda(id, placa) {
            if(confirm("¿Confirmas que la placa " + placa + " ya pagó su deuda?")) {
                db.ref('conductores/' + id).update({ deuda: 0, estado: 'activo' });
            }
        }

        function cierreSemanal() {
            if(confirm("⚠️ ATENCIÓN: Esto eliminará el historial de viajes y reseteará deudas.\n¿Deseas continuar?")) {
                db.ref('viajes').remove();
                db.ref('conductores').once('value', s => {
                    s.forEach(c => {
                        db.ref('conductores/' + c.key).update({ deuda: 0, totalGeneradoHoy: 0 });
                    });
                    alert("✅ Cierre semanal completado con éxito.");
                });
            }
        }

        cargarConductores();
    </script>
</body>
</html>
