<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClickGoTaxi</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffc107">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root { --gold: #ffc107; --dark: #0b0b0b; --card: #1a1a1a; --gray-text: #a0a0a0; }
        body { font-family: 'Arial', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; touch-action: manipulation; }
        .container { width: 90%; max-width: 400px; padding: 20px 0; }
        h1 { color: var(--gold); font-size: 38px; margin: 0 0 5px 0; font-weight: 800; letter-spacing: -1px; text-shadow: 0px 4px 15px rgba(0,0,0,0.6); }
        .tagline { color: var(--gray-text); font-size: 14px; margin-top: 0; margin-bottom: 35px; }
        .role-selector { background: #222; border: 1px solid #333; padding: 5px; border-radius: 30px; display: flex; margin-bottom: 30px; position: relative; }
        .role-btn { flex: 1; padding: 12px 0; border: none; background: transparent; color: var(--gray-text); font-weight: bold; font-size: 15px; cursor: pointer; border-radius: 25px; transition: all 0.3s ease; z-index: 2; }
        .role-btn.active { color: black; background: var(--gold); box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3); }
        .card { background: var(--card); padding: 30px 25px; border-radius: 24px; border: 1px solid #2a2a2a; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); display: none; animation: fadeIn 0.4s ease; }
        .card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h3 { margin-top: 0; margin-bottom: 20px; color: #fff; font-size: 20px; letter-spacing: 0.5px; }
        .btn { display: block; padding: 16px; margin-top: 12px; border-radius: 14px; text-decoration: none; font-weight: bold; font-size: 16px; transition: all 0.2s ease; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; box-shadow: 0 4px 12px rgba(255, 193, 7, 0.2); }
        .btn-outline { border: 2px solid var(--gold); color: var(--gold); }
        .btn:active { transform: scale(0.96); }
        .footer-text { font-size: 11px; color: #333; margin-top: 40px; letter-spacing: 1px; }

        /* INTRO CINEMÁTICA EN CSS */
        #intro-cine { position: fixed; inset: 0; background: #0b0b0b; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .escena-1 { position: absolute; display: flex; flex-direction: column; align-items: center; animation: desvanecerEscena1 0.5s ease 2s forwards; }
        .taxi-neon-box { font-size: 60px; margin-bottom: 15px; filter: drop-shadow(0 0 15px #00e5ff) drop-shadow(0 0 25px #ff007f); animation: flotarTaxi 1.5s infinite alternate ease-in-out; }
        .titulo-neon { color: var(--gold); font-size: 32px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 193, 7, 0.6); }
        .escena-2 { position: absolute; display: flex; flex-direction: column; align-items: center; opacity: 0; animation: mostrarEscena2 0.5s ease 2s forwards; }
        .cgt-circulo { width: 110px; height: 110px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: white; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); margin-bottom: 15px; letter-spacing: 2px; }
        .titulo-cgt { color: white; font-size: 26px; font-weight: 800; letter-spacing: 1px; margin: 0; }
        .eslogan-cgt { color: var(--gold); font-size: 13px; letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; font-weight: 600; }
        @keyframes flotarTaxi { 0% { transform: scale(0.95) translateY(0); } 100% { transform: scale(1.05) translateY(-6px); } }
        @keyframes desvanecerEscena1 { to { opacity: 0; visibility: hidden; } }
        @keyframes mostrarEscena2 { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="intro-cine">
    <div class="escena-1">
        <div class="taxi-neon-box">🚕</div>
        <div class="titulo-neon">CLICK & GO TAXI</div>
    </div>
    <div class="escena-2">
        <div class="cgt-circulo">CGT</div>
        <div class="titulo-cgt">CLICK & GO TAXI</div>
        <div class="eslogan-cgt">Tu destino a un clic</div>
    </div>
</div>

<div class="container">
    <h1>Click & Go 🚕</h1>
    <p class="tagline">¡Tu transporte en Panamá!</p>
    
    <div class="role-selector">
        <button type="button" id="btn-pasajero" class="role-btn active" onclick="window.switchRole('pasajero')">PASAJERO</button>
        <button type="button" id="btn-conductor" class="role-btn" onclick="window.switchRole('conductor')">CONDUCTOR</button>
    </div>

    <div id="card-pasajero" class="card active">
        <h3>¿A dónde vamos hoy? 👋</h3>
        <a href="login_pasajero.html" class="btn btn-gold">INGRESAR A PEDIR</a>
        <a href="registro_pasajero.html" class="btn btn-outline">CREAR CUENTA NUEVA</a>
    </div>
    <div id="card-conductor" class="card">
        <h3>Genera ingresos en tu ruta 💰</h3>
        <a href="login_conductor.html" class="btn btn-gold">EMPEZAR A TRABAJAR</a>
        <a href="registro_conductor.html" class="btn btn-outline">POSTULARSE AQUÍ</a>
    </div>
    <p class="footer-text">CLICK & GO TAXI APP © 2026</p>
</div>

<script>
    window.switchRole = function(role) {
        const btnPasajero = document.getElementById('btn-pasajero');
        const btnConductor = document.getElementById('btn-conductor');
        const cardPasajero = document.getElementById('card-pasajero');
        const cardConductor = document.getElementById('card-conductor');

        if(btnPasajero && btnConductor && cardPasajero && cardConductor) {
            btnPasajero.classList.remove('active');
            btnConductor.classList.remove('active');
            cardPasajero.classList.remove('active');
            cardConductor.classList.remove('active');

            if(role === 'pasajero') {
                btnPasajero.classList.add('active');
                cardPasajero.classList.add('active');
            } else {
                btnConductor.classList.add('active');
                cardConductor.classList.add('active');
            }
        }
    };

    setTimeout(() => {
        const intro = document.getElementById('intro-cine');
        if(intro) {
            intro.style.transition = 'opacity 0.5s ease';
            intro.style.opacity = '0';
            setTimeout(() => intro.remove(), 500);
        }
    }, 4000);

    // INICIAR EL SERVICE WORKER PARA PWABUILDER
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then((registration) => {
                console.log('Service Worker registrado con éxito:', registration.scope);
            }).catch((error) => {
                console.log('Fallo al registrar el Service Worker:', error);
            });
        });
    }
</script>
</body>
</html>
