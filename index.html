<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClickGoTaxi</title>
    <style>
        :root { --gold: #ffc107; --dark: #0b0b0b; --card: #1a1a1a; --gray-text: #a0a0a0; }
        body { font-family: 'Arial', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .container { width: 90%; max-width: 400px; padding: 20px 0; }
        h1 { color: var(--gold); font-size: 38px; margin: 0 0 5px 0; font-weight: 800; }
        .tagline { color: var(--gray-text); font-size: 14px; margin-bottom: 35px; }
        .role-selector { background: #222; border: 1px solid #333; padding: 5px; border-radius: 30px; display: flex; margin-bottom: 30px; }
        .role-btn { flex: 1; padding: 12px 0; border: none; background: transparent; color: var(--gray-text); font-weight: bold; font-size: 15px; cursor: pointer; border-radius: 25px; }
        .role-btn.active { color: black; background: var(--gold); }
        .card { background: var(--card); padding: 30px 25px; border-radius: 24px; border: 1px solid #2a2a2a; margin-bottom: 20px; display: none; }
        .card.active { display: block; }
        h3 { margin-top: 0; margin-bottom: 20px; color: #fff; font-size: 20px; }
        .btn { display: block; padding: 16px; margin-top: 12px; border-radius: 14px; text-decoration: none; font-weight: bold; font-size: 16px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { border: 2px solid var(--gold); color: var(--gold); }
        .footer-text { font-size: 11px; color: #333; margin-top: 40px; }
        #intro-video { position: fixed; inset: 0; background: #0b0b0b; z-index: 999999; display: flex; align-items: center; justify-content: center; }
        #intro-video video { width: 100%; height: 100%; object-fit: contain; background:#0b0b0b; }
        #tap-to-play { position: absolute; bottom: 30px; background: rgba(255,193,7,0.9); color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<!-- Si la página se recarga por el botón atrás, este contenedor se oculta de inmediato vía JS -->
<div id="intro-video">
    <video id="vIntro" muted playsinline webkit-playsinline preload="auto">
        <source src="logo-fusionado.mp4?v=4" type="video/mp4">
    </video>
    <div id="tap-to-play">TOCA PARA INICIAR</div>
</div>

<div class="container">
    <h1>Click & Go 🚕</h1>
    <p class="tagline">¡Tu transporte en Panamá!</p>
    <div class="role-selector">
        <button id="btn-pasajero" class="role-btn active" onclick="switchRole('pasajero')">PASAJERO</button>
        <button id="btn-conductor" class="role-btn" onclick="switchRole('conductor')">CONDUCTOR</button>
    </div>
    <div id="card-pasajero" class="card active">
        <h3>¿A dónde vamos hoy? 👋</h3>
        <a href="login_pasajero.html" class="btn btn-gold">INGRESAR A PEDIR</a>
        <a href="registro_pasajero.html" class="btn btn-outline">CREAR CUENTA NUEVA</a>
    </div>
    <div id="card-conductor" class="card">
        <h3>Genera ingresos en tu ruta 💰</h3>
        <a href="login_conductor.html" class="btn btn-gold">EMPEZAR A TRABAJAR</a>
        <a href="registro_conductor.html" class="btn btn-outline">POSTULARSE AQUÍ</a>
    </div>
    <p class="footer-text">CLICK & GO TAXI APP © 2026</p>
</div>

<script>
    // Solución al problema de caché (net::ERR_CACHE_MISS) al presionar "Atrás" en móviles
    window.addEventListener('pageshow', function (event) {
        if (event.persisted) {
            // Si la página se cargó desde la memoria caché del navegador, eliminamos el intro de golpe
            const introDiv = document.getElementById('intro-video');
            if (introDiv) introDiv.remove();
        }
    });

    function switchRole(role) {
        document.getElementById('btn-pasajero').classList.remove('active');
        document.getElementById('btn-conductor').classList.remove('active');
        document.getElementById('card-pasajero').classList.remove('active');
        document.getElementById('card-conductor').classList.remove('active');
        if(role === 'pasajero') {
            document.getElementById('btn-pasajero').classList.add('active');
            document.getElementById('card-pasajero').classList.add('active');
        } else {
            document.getElementById('btn-conductor').classList.add('active');
            document.getElementById('card-conductor').classList.add('active');
        }
    }

    const v = document.getElementById('vIntro');
    const intro = document.getElementById('intro-video');
    const tapText = document.getElementById('tap-to-play');
    let iniciado = false;
    let cerrado = false;

    function cerrarIntro(){
        if(cerrado) return;
        cerrado = true;
        if(intro) {
            intro.style.transition = 'opacity 0.6s ease';
            intro.style.opacity = '0';
            setTimeout(() => { intro.remove(); }, 600);
        }
    }

    function iniciarVideo(){
        if(iniciado || cerrado) return;
        iniciado = true;
        if(tapText) tapText.style.display = 'none';
        v.muted = true;
        v.currentTime = 0;
        v.play().catch(() => {
            cerrarIntro();
        });
    }

    if (intro) {
        intro.addEventListener('touchstart', iniciarVideo);
        intro.addEventListener('click', iniciarVideo);
    }
    document.addEventListener('touchstart', iniciarVideo, {once:true});
    
    if (v) {
        v.addEventListener('ended', cerrarIntro);
        v.addEventListener('error', cerrarIntro);
    }
    
    // Seguridad de tiempo máximo
    setTimeout(cerrarIntro, 7000);
</script>
</body>
</html>
