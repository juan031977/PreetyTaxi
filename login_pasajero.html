<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pasajero - ClickGoTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { position: relative; background: #1a1a1a; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; border: 1px solid #333; text-align: center; }
        h2 { color: #ffc107; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button { background: #ffc107; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .btn-volver { position: absolute; top: 15px; left: 15px; background: transparent; color: #aaa; border: none; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 20; width: auto; padding: 0; margin: 0; }
        .btn-volver:hover { color: white; }
    </style>
</head>
<body>
    <div class="login-box">
        <button class="btn-volver" onclick="window.history.back()">⬅ Volver</button>
        
        <h2>Entrar Pasajero</h2>
        <input type="tel" id="tel" placeholder="Número Celular">
        <input type="password" id="pass" placeholder="Tu Contraseña">
        <button onclick="login()">INGRESAR</button>
        <a href="registro_pasajero.html" style="color:#888; display:block; margin-top:15px; text-decoration:none; font-size:13px;">Crear cuenta nueva</a>
        
        <button onclick="mostrarRecuperacion()" style="background:transparent; border:none; color:#ffc107; font-size:13px; margin-top:10px; padding:5px; cursor:pointer; width:100%;">¿Olvidaste tu contraseña?</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
            databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        function login() {
            const t = document.getElementById('tel').value;
            const p = document.getElementById('pass').value;

            // Validación básica
            if(!t || !p) {
                alert("Por favor completa los campos.");
                return;
            }

            firebase.database().ref('pasajeros/' + t).once('value').then(snap => {
                const u = snap.val();
                
                if(u && u.password === p) {
                    localStorage.setItem('userCel', t);
                    localStorage.setItem('userName', u.nombre);
                    window.location.href = "pedir_taxi.html"; 
                } else {
                    alert("❌ Error: Celular o clave incorrectos.");
                }
            }).catch(error => {
                console.error(error);
                alert("Error de conexión");
            });
        }

        // NUEVO: Función para recuperar contraseña validando con el correo
        function mostrarRecuperacion() {
            const tel = prompt("Ingresa tu número de celular registrado:");
            if (!tel) return;

            const emailConfirm = prompt("Ingresa el correo electrónico con el que te registraste:");
            if (!emailConfirm) return;

            firebase.database().ref('pasajeros/' + tel).once('value').then(snap => {
                const u = snap.val();
                
                // Comparamos que exista el usuario y que el correo coincida
                if (u && u.email && u.email.toLowerCase() === emailConfirm.toLowerCase()) {
                    alert("✅ Tu contraseña es: " + u.password);
                } else {
                    alert("❌ Datos incorrectos. El celular o el correo no coinciden.");
                }
            }).catch(error => {
                alert("Error al conectar con la base de datos.");
            });
        }
    </script>
</body>
</html>
