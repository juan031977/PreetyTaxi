<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PreetyTaxi - Panel Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; margin-bottom: 20px; }
        .billetera { background: linear-gradient(145deg, #1a1a1a, #000); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        
        /* Switch de Conexión */
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25d366; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Card de Viaje con Animación de Alerta */
        .viaje-card { background: #111; padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 2px solid #ffc107; animation: notify 0.6s infinite alternate; }
        @keyframes notify { from { transform: scale(1); box-shadow: 0 0 0px #ffc107; } to { transform: scale(1.02); box-shadow: 0 0 15px #ffc107; } }
        
        .btn-aceptar { background: #ffc107; color: #000; padding: 14px; width: 100%; border-radius: 14px; font-weight: bold; border: none; font-size: 18px; }
        .viaje-activo { background: #fff; color: #000; padding: 25px; border-radius: 28px; border-left: 10px solid #ffc107; }
        .btn-ws { background: #25d366; color: white; display: block; text-align: center; text-decoration: none; padding: 15px; border-radius: 12px; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body onload="cargar()">

    <div class="status-bar">
        <span id="status-text" style="font-weight:bold;">DESCONECTADO</span>
        <label class="switch">
            <input type="checkbox" id="check-status" onchange="toggleConexion(this)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="billetera">
        <div id="lbl-cel" style="font-size: 10px; opacity: 0.5; margin-bottom: 8px;">---</div>
        <div style="display:flex; justify-content: space-around;">
            <div><small style="color:#888;">HOY</small><div id="txt-ventas" class="monto">B/. 0.00</div></div>
            <div><small style="color:#888;">CUOTA</small><div id="txt-deuda" class="monto" style="color:#ff4d4d;">B/. 0.00</div></div>
        </div>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    
    // USAMOS EL AUDIO DE TU CÓDIGO QUE SÍ FUNCIONA
    const sonidoAlerta = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    let ultimoViajeId = "";

    function cargar() {
        if(!miCel) return window.location.href="login.html";
        document.getElementById('lbl-cel').innerText = "CHOFER: " + miCel;
        
        db.ref('conductores/' + miCel).on('value', s => {
            const d = s.val() || {};
            document.getElementById('check-status').checked = d.conectado || false;
            const statusTxt = document.getElementById('status-text');
            statusTxt.innerText = d.conectado ? "ESTÁS ACTIVO" : "DESCONECTADO";
            statusTxt.style.color = d.conectado ? "#25d366" : "#ff4d4d";

            if(d.conectado) escucharViajes();
            else {
                document.getElementById('lista-viajes').innerHTML = "";
                db.ref('viajes').off();
            }
        });
    }

    function toggleConexion(el) {
        // "Despertar" el audio en móvil
        sonidoAlerta.play().then(() => { sonidoAlerta.pause(); sonidoAlerta.currentTime = 0; });
        db.ref('conductores/' + miCel).update({ conectado: el.checked });
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            const lista = document.getElementById('lista-viajes');
            let html = ""; let hay = false;

            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    hay = true;
                    if(ultimoViajeId !== child.key) {
                        sonidoAlerta.play().catch(e => console.log("Audio bloqueado"));
                        if(navigator.vibrate) navigator.vibrate([300, 100, 300]);
                        ultimoViajeId = child.key;
                    }
                    html += `<div class="viaje-card">
                        <div style="display:flex; justify-content:space-between"><span>🚕 NUEVO VIAJE</span><b>B/. ${v.precio}</b></div>
                        <p style="margin:10px 0;">Recoger: ${v.origen}</p>
                        <button class="btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR</button>
                    </div>`;
                } else if(v.estado === "en curso" && v.conductorCel === miCel) {
                    hay = true;
                    html = `<div class="viaje-activo">
                        <h2 style="margin:0;">${v.cliente}</h2>
                        <p>📍 ${v.origen}</p>
                        <div style="font-size:28px; font-weight:bold; margin:10px 0;">B/. ${v.precio}</div>
                        <a href="https://wa.me/507${v.telefono}" class="btn-ws"><i class="fab fa-whatsapp"></i> CHATEAR</a>
                        <button onclick="finalizar('${child.key}')" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:12px; border:none; font-weight:bold;">FINALIZAR</button>
                    </div>`;
                }
            });
            if(!hay) ultimoViajeId = "";
            lista.innerHTML = hay ? html : '<p style="text-align:center; color:#444; margin-top:30px;">Esperando pedidos...</p>';
        });
    }

    function aceptar(id) {
        db.ref('viajes/' + id).update({ estado: 'en curso', conductorCel: miCel });
    }

    function finalizar(id) {
        if(confirm("¿Viaje terminado?")) {
            db.ref('viajes/' + id).update({ estado: 'completado' });
        }
    }

    // EL SECRETO: MANTENER LA PANTALLA PRENDIDA
    if ('wakeLock' in navigator) {
        let wakeLock = null;
        const requestWakeLock = async () => {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        };
        requestWakeLock();
        // Si el usuario sale y vuelve, pedimos el bloqueo de nuevo
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });
    }
</script>
</body>
</html>
