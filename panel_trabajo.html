<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PreetyTaxi - Panel</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffc107">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 15px; border-radius: 50px; border: 1px solid #333; margin-bottom: 20px; }
        .billetera { background: #111; padding: 20px; border-radius: 24px; border: 1px solid #333; text-align: center; margin-bottom: 15px; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .viaje-card { background: #111; padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 2px solid #ffc107; animation: blink 0.8s infinite; }
        @keyframes blink { 0% { border-color: #ffc107; } 50% { border-color: #333; } 100% { border-color: #ffc107; } }
        .btn-aceptar { background: #ffc107; color: #000; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; border: none; font-size: 16px; cursor: pointer; }
        .btn-alertas { background: #222; color: #ffc107; border: 1px dashed #ffc107; padding: 12px; width: 100%; border-radius: 12px; margin-top: 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body onload="cargar()">

    <div class="status-bar">
        <span id="status-text" style="font-weight: bold;">DESCONECTADO</span>
        <button id="btn-power" onclick="toggleConexion()" style="background:none; border:none; color:#444; font-size:30px;"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="billetera">
        <div style="display:flex; justify-content: space-around;">
            <div><small style="color:#888;">GANANCIA</small><div id="txt-ventas" class="monto">B/. 0.00</div></div>
            <div><small style="color:#888;">DEUDA</small><div id="txt-deuda" class="monto" style="color:#ff4d4d;">B/. 0.00</div></div>
        </div>
        <button class="btn-alertas" onclick="activarYProbar()">🔔 ACTIVAR ALERTAS Y SONIDO</button>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    
    // USANDO TU SONIDO SUBIDO
    const sonidoAlerta = new Audio('alerta.mp3');
    let ultimoViajeId = "";
    let conectado = false;

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("Motor listo"));
    }

    function activarYProbar() {
        Notification.requestPermission().then(perm => {
            if(perm === 'granted') {
                // Probamos el sonido inmediatamente para que el navegador lo registre
                sonidoAlerta.play().catch(e => alert("Toca la pantalla para permitir sonido"));
                alert("✅ ¡Sonido y Alertas activadas correctamente!");
            }
        });
    }

    function cargar() {
        if(!miCel) return window.location.href="login.html";
        
        db.ref('conductores/' + miCel).on('value', s => {
            const d = s.val() || {};
            conectado = d.conectado || false;
            document.getElementById('txt-ventas').innerText = "B/. " + (d.totalGeneradoHoy || 0);
            document.getElementById('txt-deuda').innerText = "B/. " + (d.deuda || 0);
            
            const txt = document.getElementById('status-text');
            const btn = document.getElementById('btn-power');
            txt.innerText = conectado ? "EN LÍNEA" : "DESCONECTADO";
            txt.style.color = conectado ? "#25d366" : "#ff4d4d";
            btn.style.color = conectado ? "#25d366" : "#444";

            if(conectado) escucharViajes();
            else document.getElementById('lista-viajes').innerHTML = "";
        });
    }

    function toggleConexion() {
        // Al encender, hacemos un pequeño "play" silencioso para ganar el permiso de audio
        sonidoAlerta.play().then(() => { sonidoAlerta.pause(); sonidoAlerta.currentTime = 0; });
        db.ref('conductores/' + miCel).update({ conectado: !conectado });
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            let html = ""; let hay = false;
            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    hay = true;
                    if(ultimoViajeId !== child.key) {
                        sonidoAlerta.play(); // DISPARA TU SONIDO
                        lanzarPush(v.origen, v.precio);
                        ultimoViajeId = child.key;
                    }
                    html += `<div class="viaje-card">
                        <b>🚕 ¡VIAJE DISPONIBLE!</b><br>
                        <p style="margin:8px 0;">Desde: ${v.origen}</p>
                        <div style="font-size:22px; color:#ffc107;">B/. ${v.precio}</div>
                        <button class="btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR</button>
                    </div>`;
                }
            });
            document.getElementById('lista-viajes').innerHTML = hay ? html : "<p style='text-align:center;color:#444;'>Esperando pedidos...</p>";
        });
    }

    function lanzarPush(origen, precio) {
        if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification("🚕 PREETY TAXI", {
                    body: `NUEVO VIAJE: B/. ${precio}\nLugar: ${origen}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/71/71222.png",
                    badge: "https://cdn-icons-png.flaticon.com/512/71/71222.png",
                    vibrate: [500, 200, 500],
                    tag: "viaje-alerta",
                    renotify: true
                });
            });
        }
    }

    function aceptar(id) {
        db.ref('viajes/' + id).update({ estado: 'en curso', conductorCel: miCel });
    }
</script>
</body>
</html>
