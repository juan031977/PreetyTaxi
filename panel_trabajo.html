<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Trabajo - PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .billetera { background: linear-gradient(145deg, #1a1a1a, #000); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; margin-bottom: 5px; }
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25d366; }
        input:checked + .slider:before { transform: translateX(26px); }
        
        .msg-permiso { color: #ffc107; font-size: 11px; text-align: center; margin-bottom: 20px; display: block; font-weight: bold; }
        
        .viaje-card { background: #fff; color: #000; padding: 18px; border-radius: 20px; margin-bottom: 12px; border-left: 10px solid #ffc107; animation: notify 0.5s infinite alternate; }
        @keyframes notify { from { border-color: #ffc107; } to { border-color: #ff4d4d; } }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn-mapa { background: #4285F4; color: white; }
        .btn-ws { background: #25d366; color: white; }
        .btn-aceptar { background: #ffc107; color: #000; font-size: 18px; margin-top: 15px; }
        
        .viaje-activo { background: #fff; color: #000; padding: 25px; border-radius: 28px; border-left: 10px solid #ffc107; }
        .btn-fin { background: #000; color: #fff; }
        .btn-cancelar { background: #fff; color: #ff4d4d; border: 1px solid #ff4d4d; font-size: 12px; }
    </style>
</head>
<body onload="cargar()">
    <div class="status-bar">
        <span id="status-text">Cargando...</span>
        <label class="switch">
            <input type="checkbox" id="check-status" onchange="toggleConexion(this)">
            <span class="slider"></span>
        </label>
    </div>

    <small id="msg-propiedades" class="msg-permiso">⚠️ Activa sonido y notificaciones en propiedades</small>

    <div class="billetera">
        <div id="lbl-cel" style="font-size: 10px; opacity: 0.5; margin-bottom: 8px;">---</div>
        <div style="display:flex; justify-content: space-around;">
            <div><small style="color:#888;">GANANCIA</small><div id="txt-ventas" class="monto">B/. 0.00</div></div>
            <div><small style="color:#888;">CUOTA</small><div id="txt-deuda" class="monto" style="color:#ff4d4d;">B/. 0.00</div></div>
        </div>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    const silbido = new Audio('https://raw.githubusercontent.com/juan031977/PreetyTaxi/main/silbido.mp3');
    let ultimoViajeId = "";

    function cargar() {
        if(!miCel) return window.location.href="login.html";
        document.getElementById('lbl-cel').innerText = "CHOFER: " + miCel;
        db.ref('conductores/' + miCel).update({ conectado: false });

        db.ref('conductores/' + miCel).on('value', s => {
            const d = s.val() || {};
            document.getElementById('txt-ventas').innerText = "B/. " + (parseFloat(d.totalGeneradoHoy) || 0).toFixed(2);
            document.getElementById('txt-deuda').innerText = "B/. " + (parseFloat(d.deuda) || 0).toFixed(2);
            document.getElementById('check-status').checked = d.conectado || false;
            
            const statusTxt = document.getElementById('status-text');
            if(d.conectado) {
                statusTxt.innerText = "ESTÁS ACTIVO"; statusTxt.style.color = "#25d366";
                escucharViajes();
            } else {
                statusTxt.innerText = "DESCONECTADO"; statusTxt.style.color = "#ff4d4d";
                db.ref('viajes').off();
                document.getElementById('lista-viajes').innerHTML = '<p style="text-align:center; color:#444;">Ponte en línea</p>';
            }
        });
    }

    function toggleConexion(el) {
        silbido.play().then(() => { silbido.pause(); silbido.currentTime = 0; }).catch(e => {});
        db.ref('conductores/' + miCel).update({ conectado: el.checked });
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            const lista = document.getElementById('lista-viajes');
            let html = ""; let hay = false;

            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    hay = true;
                    if(ultimoViajeId !== child.key) {
                        silbido.play();
                        ultimoViajeId = child.key;
                    }

                    // Generar link de recorrido (Mapa)
                    const urlMapa = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(v.origen)}&destination=${encodeURIComponent(v.destino)}&travelmode=driving`;
                    const textoChat = `Hola ${v.cliente}, vi tu pedido en PreetyTaxi. ¿Sigue disponible?`;

                    html += `<div class="viaje-card">
                        <div style="display:flex; justify-content:space-between"><b>NUEVO PEDIDO</b> <b style="font-size:20px;">B/. ${v.precio}</b></div>
                        <h2 style="margin:10px 0;">${v.cliente}</h2>
                        <p style="margin:2px 0;"><b>Origen:</b> ${v.origen}</p>
                        <p style="margin:2px 0;"><b>Destino:</b> ${v.destino}</p>
                        
                        <a href="${urlMapa}" target="_blank" class="btn btn-mapa"><i class="fas fa-route"></i> VER RECORRIDO EN MAPA</a>
                        <a href="https://wa.me/507${v.telefono}?text=${encodeURIComponent(textoChat)}" class="btn btn-ws"><i class="fab fa-whatsapp"></i> CONTACTAR CLIENTE</a>
                        
                        <button class="btn btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR VIAJE</button>
                    </div>`;
                } else if(v.estado === "en curso" && v.conductorCel === miCel) {
                    hay = true;
                    html = `<div class="viaje-activo">
                        <small>VIAJE EN CURSO</small>
                        <h2>${v.cliente}</h2>
                        <p>📍 ${v.origen} ➔ ${v.destino}</p>
                        <div style="font-size:30px; font-weight:bold; margin:10px 0;">B/. ${v.precio}</div>
                        <a href="https://wa.me/507${v.telefono}" class="btn btn-ws"><i class="fab fa-whatsapp"></i> CHATEAR</a>
                        <button class="btn btn-fin" onclick="finalizar('${child.key}')">FINALIZAR Y COBRAR</button>
                    </div>`;
                }
            });
            lista.innerHTML = hay ? html : '<p style="text-align:center; color:#333;">Esperando viajes...</p>';
        });
    }

    function aceptar(id) {
        db.ref('conductores/' + miCel).once('value', s => {
            const d = s.val() || {};
            db.ref('viajes/' + id).update({ estado: 'en curso', conductorCel: miCel, conductorNombre: d.nombre, conductorPlaca: d.placa });
        });
    }

    function finalizar(id) {
        if(!confirm("¿Finalizar viaje?")) return;
        db.ref('viajes/' + id).once('value', snap => {
            const v = snap.val();
            const precio = parseFloat(v.precio);
            const cuota = precio <= 3.25 ? 0.25 : (precio <= 6.50 ? 0.50 : 1.00);
            const hoy = obtenerFechaHoy();
            db.ref('viajes/' + id).update({ estado: 'completado' });
            db.ref('conductores/' + miCel).once('value', s => {
                const dc = s.val() || {};
                db.ref('conductores/' + miCel).update({
                    totalGeneradoHoy: (parseFloat(dc.totalGeneradoHoy || 0) + (precio - cuota)).toFixed(2),
                    deuda: (parseFloat(dc.deuda || 0) + cuota).toFixed(2)
                });
            });
        });
    }
    function obtenerFechaHoy() { const d = new Date(); return d.getDate() + "-" + (d.getMonth() + 1) + "-" + d.getFullYear(); }
</script>
</body>
</html>
