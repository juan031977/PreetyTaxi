<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .billetera { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: center; margin-bottom: 20px; }
        .monto { color: #ffc107; font-size: 24px; font-weight: bold; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 50px; margin-bottom: 20px; }
        .viaje-card { background: #111; padding: 20px; border-radius: 20px; border: 2px solid #ffc107; margin-bottom: 15px; }
        .btn-aceptar { background: #ffc107; color: #000; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; border: none; font-size: 16px; cursor: pointer; }
        .btn-alertas { background: #222; color: #ffc107; border: 1px dashed #ffc107; padding: 10px; width: 100%; border-radius: 10px; margin-top: 10px; font-size: 11px; }
    </style>
</head>
<body onload="iniciar()">

    <div class="status-bar">
        <span id="txt-status">DESCONECTADO</span>
        <button id="btn-power" onclick="toggleConexion()" style="background:none; border:none; color:#444; font-size:30px;"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="billetera">
        <div style="display:flex; justify-content: space-around;">
            <div><small>GANANCIA</small><div id="txt-ventas" class="monto">B/. 0.00</div></div>
            <div><small>CUOTA</small><div id="txt-deuda" class="monto" style="color:#ff4d4d;">B/. 0.00</div></div>
        </div>
        <button class="btn-alertas" onclick="pedirPermiso()">🔔 ACTIVAR NOTIFICACIONES EN BOLSILLO</button>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    const sonido = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    let ultimoId = "";
    let conectado = false;

    // Registro del SW (Solo en HTTPS)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => console.log("Motor listo"));
    }

    function pedirPermiso() {
        Notification.requestPermission().then(p => {
            if(p === 'granted') alert("✅ Ahora recibirás alertas con la pantalla apagada.");
        });
    }

    function iniciar() {
        if(!miCel) return window.location.href="login.html";
        
        db.ref('conductores/' + miCel).on('value', s => {
            const d = s.val() || {};
            conectado = d.conectado || false;
            document.getElementById('txt-ventas').innerText = "B/. " + (d.totalGeneradoHoy || 0);
            document.getElementById('txt-deuda').innerText = "B/. " + (d.deuda || 0);
            document.getElementById('txt-status').innerText = conectado ? "EN LÍNEA" : "DESCONECTADO";
            document.getElementById('txt-status').style.color = conectado ? "#25d366" : "#ff4d4d";
            document.getElementById('btn-power').style.color = conectado ? "#25d366" : "#444";
            
            if(conectado) escuchar();
            else document.getElementById('lista-viajes').innerHTML = "";
        });
    }

    function toggleConexion() {
        conectado = !conectado;
        sonido.play().then(() => sonido.pause()); // Activa el audio para el navegador
        db.ref('conductores/' + miCel).update({ conectado: conectado });
    }

    function escuchar() {
        db.ref('viajes').on('value', snap => {
            let html = "";
            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    if(ultimoId !== child.key) {
                        lanzarNotificacion(v.origen, v.precio);
                        ultimoId = child.key;
                    }
                    html += `<div class="viaje-card">
                        <b>📍 NUEVO PEDIDO</b><br><small>${v.origen}</small>
                        <h2 style="color:#ffc107">B/. ${v.precio}</h2>
                        <button class="btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR</button>
                    </div>`;
                }
            });
            document.getElementById('lista-viajes').innerHTML = html || "<p style='text-align:center; color:#555;'>Esperando...</p>";
        });
    }

    function lanzarNotificacion(origen, precio) {
        sonido.play();
        if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification("🚕 VIAJE DISPONIBLE", {
                    body: `B/. ${precio} - Desde: ${origen}`,
                    icon: "favicon.ico",
                    vibrate: [500, 200, 500],
                    tag: "taxi-alert"
                });
            });
        }
    }

    function aceptar(id) {
        db.ref('viajes/' + id).update({ estado: 'en curso', conductorCel: miCel });
    }
</script>
</body>
</html>
