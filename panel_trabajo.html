<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Trabajo - Conductor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .viaje-card { border: 2px solid #ffc107; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #111; }
        .btn-aceptar { background: #ffc107; color: #000; border: none; width: 100%; padding: 12px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .vacio { color: #666; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <h3>🚖 VIAJES DISPONIBLES</h3>
    <div id="lista-viajes">
        <p class="vacio">Buscando servicios...</p>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
            databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function escucharViajes() {
            // Escucha activa de la rama 'viajes'
            db.ref('viajes').on('value', (snapshot) => {
                const contenedor = document.getElementById('lista-viajes');
                contenedor.innerHTML = "";
                let hayViajes = false;

                snapshot.forEach((child) => {
                    const v = child.val();
                    const idViaje = child.key;

                    // IMPORTANTE: Solo muestra si el estado es exactamente 'pendiente'
                    if (v.estado === "pendiente") {
                        hayViajes = true;
                        contenedor.innerHTML += `
                            <div class="viaje-card">
                                <p>📍 <b>ORIGEN:</b> ${v.origen}</p>
                                <p>🏁 <b>DESTINO:</b> ${v.destino}</p>
                                <p>💰 <b>PAGO:</b> B/. ${v.precio}</p>
                                <p>👤 <b>CLIENTE:</b> ${v.cliente}</p>
                                <button class="btn-aceptar" onclick="aceptarViaje('${idViaje}')">ACEPTAR SERVICIO</button>
                            </div>
                        `;
                    }
                });

                if (!hayViajes) {
                    contenedor.innerHTML = '<p class="vacio">No hay viajes disponibles por ahora.</p>';
                }
            });
        }

        function aceptarViaje(id) {
            const miCel = localStorage.getItem('driverCel') || "SinID";
            // Cambia estado para que desaparezca de otros conductores
            db.ref('viajes/' + id).update({
                estado: "en curso",
                conductor: miCel
            }).then(() => {
                alert("Viaje aceptado. ¡En marcha!");
            });
        }

        // Iniciar la escucha al cargar la página
        escucharViajes();
    </script>
</body>
</html>
