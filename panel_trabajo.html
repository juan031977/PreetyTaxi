<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Trabajo - PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .billetera { background: #1a1a1a; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid #333; }
        .monto { color: #ffc107; font-size: 24px; font-weight: bold; }
        
        /* Botón de Estado */
        .btn-status { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .activo { background: #28a745; color: white; }
        .inactivo { background: #dc3545; color: white; }

        .viaje-card { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #ffc107; }
        .btn-aceptar { background: #ffc107; color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="billetera">
        <div style="color: #888; font-size: 12px;">MI BILLETERA (HOY)</div>
        <div id="ganancia-hoy" class="monto">B/. 0.00</div>
    </div>

    <button id="btn-disponibilidad" class="btn-status inactivo" onclick="toggleDisponibilidad()">ESTADO: INACTIVO 🔴</button>

    <h3>Viajes Disponibles</h3>
    <div id="lista-viajes"></div>

    <audio id="audio-silbido" src="silbido.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const miCel = localStorage.getItem('driverCel');
        const sonido = document.getElementById('audio-silbido');

        // Función para cambiar disponibilidad
        function toggleDisponibilidad() {
            const btn = document.getElementById('btn-disponibilidad');
            db.ref('conductores/' + miCel).once('value', snap => {
                const actual = snap.val().estado;
                const nuevo = (actual === 'activo') ? 'inactivo' : 'activo';
                
                db.ref('conductores/' + miCel).update({ estado: nuevo });
                
                if(nuevo === 'activo') {
                    btn.innerText = "ESTADO: ACTIVO 🟢";
                    btn.className = "btn-status activo";
                } else {
                    btn.innerText = "ESTADO: INACTIVO 🔴";
                    btn.className = "btn-status inactivo";
                }
            });
        }

        function escucharViajes() {
            db.ref('viajes').on('value', snapshot => {
                const contenedor = document.getElementById('lista-viajes');
                contenedor.innerHTML = "";
                let hayNuevos = false;

                snapshot.forEach(child => {
                    const v = child.val();
                    if(v.estado === "pendiente") {
                        hayNuevos = true;
                        contenedor.innerHTML += `
                            <div class="viaje-card">
                                <strong>${v.cliente}</strong><br>
                                📍 ${v.origen} -> ${v.destino}<br>
                                <span style="color:#ffc107">💰 Tarifa: B/. ${v.precio}</span>
                                <button class="btn-aceptar" onclick="aceptarViaje('${child.key}')">ACEPTAR VIAJE</button>
                            </div>`;
                    }
                });
                if(hayNuevos) sonido.play().catch(e => console.log("Sonido bloqueado"));
            });
        }

        function aceptarViaje(id) {
            db.ref('conductores/' + miCel).once('value', s => {
                const d = s.val();
                if(d.estado !== 'activo') return alert("Ponte en modo ACTIVO para tomar viajes");
                
                db.ref('viajes/' + id).update({
                    estado: "en curso",
                    conductorNombre: d.nombre,
                    conductorPlaca: d.placa,
                    conductorCel: miCel
                });
            });
        }

        window.onload = escucharViajes;
    </script>
</body>
</html>
