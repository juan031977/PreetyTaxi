<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Trabajo - PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* MANTENGO TU DISEÑO ORIGINAL OSCURO */
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .billetera { background: linear-gradient(145deg, #1a1a1a, #000); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 10px 20px; border-radius: 50px; margin-bottom: 20px; border: 1px solid #333; }
        
        .viaje-card { background: #1a1a1a; padding: 20px; border-radius: 20px; border-left: 5px solid #ffc107; margin-bottom: 15px; }
        .btn-accion { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-aceptar { background: #ffc107; color: #000; }
        .btn-finalizar { background: #28a745; color: #fff; }
        .btn-wsp { background: #25d366; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: bold; }
        
        .toggle-btn { width: 50px; height: 25px; background: #333; border-radius: 25px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle-btn.on { background: #28a745; }
        .toggle-btn::before { content: ''; position: absolute; width: 21px; height: 21px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-btn.on::before { left: 27px; }
    </style>
</head>
<body>

<div class="billetera">
    <p style="margin:0; color:#888; font-size:14px;">Ganancia de Hoy</p>
    <div class="monto">B/. <span id="ganancia-hoy">0.00</span></div>
    <p style="margin:5px 0 0 0; color:#ff4444; font-size:12px;">Cuota Pendiente: B/. <span id="deuda-total">0.00</span></p>
</div>

<div class="status-bar">
    <span>Estatus: <strong id="txt-status" style="color:#888;">OFFLINE</strong></span>
    <div class="toggle-btn" id="btn-status" onclick="toggleOnline()"></div>
</div>

<div id="contenedor-viajes">
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
        databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const miCel = localStorage.getItem('driverCel');
    let miInfo = null;
    let esOnline = false;

    // Obtener info del chofer y su deuda
    db.ref('conductores/' + miCel).on('value', snap => {
        miInfo = snap.val();
        if(miInfo) {
            document.getElementById('ganancia-hoy').innerText = parseFloat(miInfo.totalGeneradoHoy || 0).toFixed(2);
            document.getElementById('deuda-total').innerText = parseFloat(miInfo.deuda || 0).toFixed(2);
            
            // Si el admin lo bloqueó, lo sacamos de línea
            if(miInfo.estado === "bloqueado") {
                esOnline = false;
                actualizarUIStatus();
            }
        }
    });

    function toggleOnline() {
        if(miInfo && miInfo.estado === "bloqueado") return alert("❌ Acceso bloqueado. Contacta al Admin para pagar tu cuota.");
        esOnline = !esOnline;
        actualizarUIStatus();
    }

    function actualizarUIStatus() {
        const btn = document.getElementById('btn-status');
        const txt = document.getElementById('txt-status');
        if(esOnline) {
            btn.classList.add('on');
            txt.innerText = "ONLINE";
            txt.style.color = "#28a745";
            escucharViajes();
        } else {
            btn.classList.remove('on');
            txt.innerText = "OFFLINE";
            txt.style.color = "#888";
            document.getElementById('contenedor-viajes').innerHTML = "";
            db.ref('viajes').off();
        }
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            if(!esOnline) return;
            const container = document.getElementById('contenedor-viajes');
            container.innerHTML = "";
            
            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "esperando" || (v.estado === "en curso" && v.conductorCel === miCel)) {
                    const card = document.createElement('div');
                    card.className = "viaje-card";
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <strong>📍 ORIGEN:</strong> <span>GPS</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top:5px;">
                            <strong>🏁 DESTINO:</strong> <span>${v.destino}</span>
                        </div>
                        <div style="margin-top:15px; border-top:1px solid #333; padding-top:10px; display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:20px; font-weight:bold; color:#ffc107;">B/. ${v.monto}</span>
                            ${v.estado === "esperando" ? 
                                `<button class="btn-accion btn-aceptar" onclick="aceptarViaje('${child.key}')">ACEPTAR VIAJE</button>` : 
                                `<div>
                                    <a href="https://wa.me/507${v.celular}?text=Hola ${v.cliente}, soy tu conductor de PreetyTaxi. Voy en camino." class="btn-accion btn-wsp"><i class="fab fa-whatsapp"></i> &nbsp; CHATEAR</a>
                                    <button class="btn-accion btn-finalizar" onclick="finalizarViaje('${child.key}', ${v.monto})">FINALIZAR VIAJE</button>
                                 </div>`
                            }
                        `;
                    container.appendChild(card);
                }
            });
        });
    }

    function aceptarViaje(id) {
        db.ref('viajes/' + id).update({
            estado: "en curso",
            conductorNombre: miInfo.nombre,
            conductorCel: miCel,
            conductorPlaca: miInfo.placa
        });
    }

    function finalizarViaje(id, montoTotal) {
        // LÓGICA DE CUOTA: Ajusta el 0.50 si tu comisión es distinta
        const cuotaApp = 0.50; 
        const gananciaLimpia = montoTotal - cuotaApp;
        const fecha = new Date();
        const hoy = fecha.getDate() + "-" + (fecha.getMonth() + 1) + "-" + fecha.getFullYear();

        const updates = {};
        updates['viajes/' + id + '/estado'] = 'completado';
        
        // Reporte para el admin
        updates['reportes_diarios/' + miCel + '/' + hoy + '/' + id] = {
            cliente: "Pasajero",
            monto: montoTotal.toFixed(2),
            ganancia: gananciaLimpia.toFixed(2),
            cuota: cuotaApp.toFixed(2),
            hora: fecha.toLocaleTimeString()
        };

        db.ref().update(updates).then(() => {
            // Actualizar billetera del chofer
            db.ref('conductores/' + miCel).once('value', s => {
                const d = s.val();
                db.ref('conductores/' + miCel).update({
                    totalGeneradoHoy: (parseFloat(d.totalGeneradoHoy || 0) + gananciaLimpia).toFixed(2),
                    deuda: (parseFloat(d.deuda || 0) + cuotaApp).toFixed(2)
                });
            });
            alert("¡Viaje completado! Se ha descontado la cuota de B/. " + cuotaApp.toFixed(2));
        });
    }

    // Mantener pantalla encendida
    if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(() => {});
    }
</script>

</body>
</html>
