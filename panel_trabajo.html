<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Trabajo - ClickGoTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; position: relative; }
        .billetera { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; margin-bottom: 15px; }
        
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25d366; }
        input:checked + .slider:before { transform: translateX(26px); }

        .viaje-card { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #ffc107; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; font-size: 14px; }
        .btn-ok { background: #ffc107; color: #000; }
        .btn-ws { background: #25d366; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-cancel { background: transparent; color: #ff4444; border: 1px solid #ff4444; font-size: 11px; }
        
        .btn-llegue { background: #007bff; color: #fff; }

        .badge-info { background: #333; color: #ffc107; padding: 8px; border-radius: 8px; font-size: 13px; margin: 8px 0; font-weight: bold; }
        .badge-mascota { background: #441111; color: #ff4444; padding: 6px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid #ff4444; text-align: center; margin-top: 5px; }
        .badge-mascota-activa { background: #ff4444; color: #fff; }

        .timer-conductor { 
            background: #000; 
            color: #ffc107; 
            padding: 12px; 
            border-radius: 10px; 
            margin: 10px 0; 
            font-weight: bold; 
            font-size: 16px; 
            text-align: center;
            border: 2px solid #ffc107;
        }
        .timer-expirado { color: #ff4444 !important; border-color: #ff4444 !important; animation: parpadeo 1s infinite; }
        .timer-detenido { color: #25d366 !important; border-color: #25d366 !important; }
        @keyframes parpadeo { 50% { opacity: 0.5; } }

        .back-btn { 
            position: absolute; top: 20px; left: 20px; color: #ffc107; text-decoration: none; font-size: 22px; font-weight: bold; line-height: 1; transition: transform 0.2s ease; z-index: 100;
        }
        .back-btn:active { transform: scale(0.85); }
    </style>
</head>
<body onload="cargar()">

    <a href="index.html" class="back-btn">←</a>

    <div class="status-bar">
        <span id="status-text">DESCONECTADO</span>
        <label class="switch">
            <input type="checkbox" id="check-status" onchange="toggleConexion(this)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="billetera">
        <div style="display:flex; justify-content: space-around;">
            <div><small style="color:#888;">GANANCIA HOY</small><div id="hoy-valor" class="monto">B/. 0.00</div></div>
            <div><small style="color:#888;">DEUDA APP</small><div id="deuda-valor" class="monto" style="color:#ff4444;">B/. 0.00</div></div>
        </div>
    </div>

    <div id="lista-viajes"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const miCel = localStorage.getItem('driverCel');
        
        // Configuración óptima de Audio con Loop para alertas
        const silbido = new Audio('https://raw.githubusercontent.com/juan031977/PreetyTaxi/main/silbido.mp3');
        silbido.loop = true; 
        
        let miEstado = "activo";
        let miConectado = false;
        let viajesSnapshot = null;
        let escuchandoCambiosViajeActual = false;
        
        let intervalRelojChofer = null;
        let idViajeConRelojActivo = "";
        let segundosRegresivos = 420; 

        function cargar() {
            if(!miCel) window.location.href = "login_conductor.html";

            db.ref('conductores/' + miCel).on('value', snap => {
                const d = snap.val() || {};
                const hoy = new Date();
                const hoyStr = hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0') + '-' + String(hoy.getDate()).padStart(2, '0');
                
                if (d.ultimaFechaAcceso !== hoyStr) {
                    if (d.ultimaFechaAcceso) {
                        const fechaAnt = new Date(d.ultimaFechaAcceso + "T00:00:00");
                        const fechaHoy = new Date(hoyStr + "T00:00:00");
                        const diffTiempo = Math.abs(fechaHoy - fechaAnt);
                        const diasPasados = Math.floor(diffTiempo / (1000 * 60 * 60 * 24));
                        
                        if (diasPasados >= 1) {
                            let nuevaDeuda = parseFloat(d.deuda || 0) + (diasPasados * 1.00);
                            if (nuevaDeuda > 5.00) nuevaDeuda = 5.00;
                            let nuevoEstado = d.estado || "activo";
                            if (nuevaDeuda > 0) nuevoEstado = "bloqueado";
                            
                            db.ref('conductores/' + miCel).update({
                                totalGeneradoHoy: 0,
                                deuda: nuevaDeuda.toFixed(2),
                                estado: nuevoEstado,
                                ultimaFechaAcceso: hoyStr
                            });
                            return;
                        }
                    } else {
                        db.ref('conductores/' + miCel).update({ ultimaFechaAcceso: hoyStr });
                        return;
                    }
                }

                miEstado = d.estado || "activo";
                miConectado = d.conectado || false;

                document.getElementById('deuda-valor').innerText = "B/. " + parseFloat(d.deuda || 0).toFixed(2);
                document.getElementById('hoy-valor').innerText = "B/. " + parseFloat(d.totalGeneradoHoy || 0).toFixed(2);
                
                const statusTxt = document.getElementById('status-text');
                const checkStatus = document.getElementById('check-status');
                
                if(miEstado === "bloqueado") {
                    statusTxt.innerText = "BLOQUEADO (PAGA TU DEUDA)";
                    statusTxt.style.color = "#ff4444";
                    checkStatus.checked = false;
                    checkStatus.disabled = true;
                } else {
                    checkStatus.disabled = false;
                    checkStatus.checked = miConectado;
                    if(miConectado) {
                        statusTxt.innerText = "ESTÁS ACTIVO";
                        statusTxt.style.color = "#25d366";
                    } else {
                        statusTxt.innerText = "DESCONECTADO";
                        statusTxt.style.color = "#ff4d4d";
                    }
                }
                renderizarViajes();
            });

            db.ref('viajes').on('value', snap => {
                viajesSnapshot = snap;
                renderizarViajes();
            });
        }

        function toggleConexion(el) {
            // TRUCO MÁGICO: Al encender o apagar el switch, desbloqueamos el audio en el navegador móvil
            silbido.volume = 0.1;
            silbido.play().then(() => { 
                silbido.pause(); 
                silbido.currentTime = 0; 
                silbido.volume = 1.0; // Restablecemos volumen completo
            }).catch(e => console.log("Audio silenciado temporalmente hasta permiso:", e));

            db.ref('conductores/' + miCel).update({ conectado: el.checked });
        }

        function renderizarViajes() {
            const lista = document.getElementById('lista-viajes');
            
            if (!miConectado && miEstado !== "bloqueado") {
                lista.innerHTML = '<p style="text-align:center; color:#444;">Ponte en línea para recibir pedidos</p>';
                limpiarRelojChofer();
                // Si el conductor se desconecta, apagamos inmediatamente cualquier silbido
                silbido.pause();
                silbido.currentTime = 0;
                return;
            }

            if (!viajesSnapshot) {
                lista.innerHTML = '<p style="text-align:center; color:#333;">Esperando viajes...</p>';
                silbido.pause();
                silbido.currentTime = 0;
                return;
            }

            let html = "";
            let hayPendientes = false;
            let tengoViajeActivo = false;

            viajesSnapshot.forEach(child => {
                const v = child.val();
                
                if (v.estado === "pendiente") {
                    hayPendientes = true;

                    let botonViaje = "";
                    if (miEstado === "bloqueado") {
                        botonViaje = `<button class="btn" style="background:#444; color:#888; cursor:not-allowed;" disabled>❌ BLOQUEADO POR DEUDA</button>`;
                    } else {
                        botonViaje = `<button class="btn btn-ok" onclick="tomarViaje('${child.key}')">ACEPTAR VIAJE</button>`;
                    }

                    let ocupantesTotales = 1 + parseInt(v.pasajerosAdicionales || 0);
                    let textoOcupantes = ocupantesTotales === 1 ? "👤 1 Pasajero (Solo)" : `👥 ${ocupantesTotales} Personas (Titular + ${v.pasajerosAdicionales})`;
                    let htmlMascota = v.mascota ? `<div class="badge-mascota badge-mascota-activa">🐶 LLEVA MASCOTA (+B/. 5.00)</div>` : "";

                    html += `
                        <div class="viaje-card">
                            <p><b>📍 Recoger en:</b> ${v.origen}</p>
                            <p><b>🏁 Destino:</b> ${v.destino}</p>
                            
                            <div class="badge-info">
                                ${textoOcupantes}<br>
                                <small style="color:#aaa;">Recargos: ${v.detallesRecargo || "Ninguno"}</small>
                            </div>
                            ${htmlMascota}

                            <p style="margin-top: 10px;"><b>💰 Tarifa Total:</b> B/. ${parseFloat(v.precio).toFixed(2)}</p>
                            ${botonViaje}
                        </div>`;
                }

                if (v.estado === "en curso" && v.conductorCel === miCel) {
                    tengoViajeActivo = true;
                    let celPasajero = String(v.clienteCel || "").replace(/\D/g, '');
                    if(celPasajero.length === 8) celPasajero = "507" + celPasajero;

                    let ocupantesTotales = 1 + parseInt(v.pasajerosAdicionales || 0);
                    let alertaMascotaCurso = v.mascota ? `<div class="badge-mascota badge-mascota-activa" style="margin-bottom:10px;">🐶 ATENCIÓN: LLEVA MASCOTA</div>` : "";

                    let botonLlegadaOFinalizar = "";
                    let htmlRelojEstatico = "";

                    if(v.conductorLlego === true) {
                        if(intervalRelojChofer) clearInterval(intervalRelojChofer); 
                        htmlRelojEstatico = `<div class="timer-conductor timer-detenido">✅ ¡LLEGASTE A TIEMPO! Esperando al pasajero...</div>`;
                        botonLlegadaOFinalizar = `<button class="btn btn-ok" style="background:#000; color:#fff;" onclick="finalizarViaje('${child.key}', ${v.precio})">FINALIZAR VIAJE</button>`;
                    } else {
                        htmlRelojEstatico = `<div id="reloj-chofer-pantalla" class="timer-conductor">Calculando tiempo...</div>`;
                        botonLlegadaOFinalizar = `<button class="btn btn-llegue" onclick="marcarLlegadaSitio('${child.key}')">🏁 ¡YA LLEGUÉ AL PUNTO!</button>`;
                    }

                    html = `
                        <div class="viaje-card" style="border-left-color: #25d366; background: #fff; color: #000;">
                            <p><b>👤 Cliente:</b> ${v.cliente}</p>
                            <p><b>📍 Recoger en:</b> ${v.origen}</p>
                            
                            ${htmlRelojEstatico}

                            <div class="badge-info" style="background:#f0f0f0; color:#000; border: 1px solid #ccc;">
                                🧑‍🤝‍🧑 Ocupantes en auto: <b>${ocupantesTotales} persona(s)</b><br>
                                <small style="color:#555;">Extras aplicados: ${v.detallesRecargo || "Ninguno"}</small>
                            </div>
                            ${alertaMascotaCurso}

                            <p style="font-size: 22px; margin: 10px 0;"><b>Total a Cobrar: B/. ${parseFloat(v.precio).toFixed(2)}</b></p>
                            
                            <a href="https://wa.me/${celPasajero}?text=Hola%20${v.cliente},%20soy%20tu%20conductor%20de%20ClickGoTaxi%20estoy%20en%20camino" class="btn btn-ws" target="_blank">HABLAR POR WHATSAPP</a>
                            ${botonLlegadaOFinalizar}
                            <button class="btn btn-cancel" onclick="cancelarViaje('${child.key}')">CANCELAR VIAJE</button>
                        </div>`;

                    activarEscuchaExpiracion(child.key);
                    
                    if (idViajeConRelojActivo !== child.key && !v.conductorLlego) {
                        idViajeConRelojActivo = child.key;
                        segundosRegresivos = 420; 
                        iniciarRelojConductor();
                    }
                }
            });

            // CONTROLADOR DEL AUDIO (Sincronizado con los estados globales de la calle)
            if (hayPendientes && !tengoViajeActivo && miConectado) {
                // Si hay pedidos pendientes en la calle, el conductor está conectado y libre: silba sin parar
                if (silbido.paused) {
                    silbido.play().catch(e => console.log("Bloqueo automático de audio prevenido por el navegador móvil.", e));
                }
            } else {
                // Si no hay viajes pendientes, o si el conductor ya tomó uno: callamos el silbido
                silbido.pause();
                silbido.currentTime = 0;
            }
            
            if(tengoViajeActivo) {
                lista.innerHTML = html;
                let elReloj = document.getElementById('reloj-chofer-pantalla');
                if(elReloj && idViajeConRelojActivo !== "") {
                    let mins = Math.floor(segundosRegresivos / 60);
                    let secs = segundosRegresivos % 60;
                    if(segundosRegresivos > 0) {
                        elReloj.innerText = `⏱️ Tiempo para llegar: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    }
                }
            } else {
                escuchandoCambiosViajeActual = false; 
                limpiarRelojChofer();
                lista.innerHTML = html || '<p style="text-align:center; color:#333;">Esperando viajes...</p>';
            }
        }

        function iniciarRelojConductor() {
            if(intervalRelojChofer) clearInterval(intervalRelojChofer);
            
            intervalRelojChofer = setInterval(() => {
                segundosRegresivos--;
                let elReloj = document.getElementById('reloj-chofer-pantalla');
                
                if (segundosRegresivos > 0) {
                    if(elReloj) {
                        let mins = Math.floor(segundosRegresivos / 60);
                        let secs = segundosRegresivos % 60;
                        elReloj.innerText = `⏱️ Tiempo para llegar: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    }
                } else {
                    clearInterval(intervalRelojChofer);
                    if(elReloj) {
                        elReloj.innerText = `🚨 ¡TIEMPO LIMITADO EXHAUSTO! El cliente puede cancelar sin costo.`;
                        elReloj.classList.add('timer-expirado');
                    }
                }
            }, 1000);
        }

        function marcarLlegadaSitio(idViaje) {
            if(intervalRelojChofer) clearInterval(intervalRelojChofer); 
            
            db.ref('viajes/' + idViaje).update({ 
                conductorLlego: true
            }).then(() => {
                renderizarViajes();
            });
        }

        function limpiarRelojChofer() {
            if(intervalRelojChofer) clearInterval(intervalRelojChofer);
            idViajeConRelojActivo = "";
            segundosRegresivos = 420;
        }

        function activarEscuchaExpiracion(idViaje) {
            if(escuchandoCambiosViajeActual) return; 
            escuchandoCambiosViajeActual = true;

            db.ref('viajes/' + idViaje).on('value', snapshot => {
                const viajeDatos = snapshot.val();
                
                if(viajeDatos && viajeDatos.estado === 'pendiente' && viajeDatos.conductorCel !== miCel) {
                    db.ref('viajes/' + idViaje).off(); 
                    escuchandoCambiosViajeActual = false;
                    limpiarRelojChofer();
                    
                    alert("🚨 ¡VIAJE EXPIRADO O DEVUELTO!\n\nSuperaste el límite de 7 minutos para recoger al pasajero y este decidió buscar a otro conductor disponible.");
                    renderizarViajes(); 
                }
            });
        }

        function tomarViaje(id) {
            if(miEstado === "bloqueado") {
                alert("🔒 Tu cuenta está bloqueada por deuda. Salda tu cuenta para tomar carreras.");
                return;
            }
            
            // Apagamos el silbido inmediatamente al pulsar en aceptar
            silbido.pause();
            silbido.currentTime = 0;

            db.ref('conductores/' + miCel).once('value', s => {
                const d = s.val();
                db.ref('viajes/' + id).update({
                    estado: 'en curso',
                    conductorCel: miCel,
                    conductorNombre: d.nombre,
                    conductorPlaca: d.placa,
                    conductorLlego: false 
                });
            });
        }

        function finalizarViaje(id, precio) {
            if(!confirm("¿Finalizar viaje?")) return;
            const p = parseFloat(precio);
            
            db.ref('viajes/' + id).off(); 
            limpiarRelojChofer();
            
            db.ref('viajes/' + id).update({ estado: 'completado' }).then(() => {
                db.ref('conductores/' + miCel).once('value', s => {
                    const dc = s.val();
                    db.ref('conductores/' + miCel).update({
                        totalGeneradoHoy: (parseFloat(dc.totalGeneradoHoy || 0) + p).toFixed(2)
                    });
                });
            });
        }

        function cancelarViaje(id) {
            if(confirm("¿Cancelar este viaje?")) {
                db.ref('viajes/' + id).off();
                limpiarRelojChofer();
                db.ref('viajes/' + id).update({ estado: 'pendiente', conductorCel: null, conductorLlego: null });
            }
        }
    </script>
</body>
</html>
