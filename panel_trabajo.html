<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Trabajo - ClickGoTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; position: relative; }
        .billetera { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; margin-bottom: 15px; }
        
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25d366; }
        input:checked + .slider:before { transform: translateX(26px); }

        .viaje-card { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #ffc107; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; font-size: 14px; }
        .btn-ok { background: #ffc107; color: #000; }
        .btn-ws { background: #25d366; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-cancel { background: transparent; color: #ff4444; border: 1px solid #ff4444; font-size: 11px; }

        /* Flecha de retroceso */
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #ffc107; 
            text-decoration: none; 
            font-size: 22px; 
            font-weight: bold; 
            line-height: 1;
            transition: transform 0.2s ease;
            z-index: 100;
        }
        .back-btn:active { transform: scale(0.85); }
    </style>
</head>
<body onload="cargar()">

    <!-- BOTÓN DE RETROCESO -->
    <a href="index.html" class="back-btn">←</a>

    <div class="status-bar">
        <span id="status-text">DESCONECTADO</span>
        <label class="switch">
            <input type="checkbox" id="check-status" onchange="toggleConexion(this)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="billetera">
        <div style="display:flex; justify-content: space-around;">
            <div><small style="color:#888;">GANANCIA HOY</small><div id="hoy-valor" class="monto">B/. 0.00</div></div>
            <div><small style="color:#888;">DEUDA APP</small><div id="deuda-valor" class="monto" style="color:#ff4444;">B/. 0.00</div></div>
        </div>
    </div>

    <div id="lista-viajes"></div>

    <script>
        // ... (el script se mantiene exactamente igual)
        const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const miCel = localStorage.getItem('driverCel');
        
        const silbido = new Audio('https://raw.githubusercontent.com/juan031977/PreetyTaxi/main/silbido.mp3');
        let ultimoViajeId = "";
        
        let miEstado = "activo";
        let miConectado = false;
        let viajesSnapshot = null;

        function cargar() {
            if(!miCel) window.location.href = "login_conductor.html";

            db.ref('conductores/' + miCel).on('value', snap => {
                const d = snap.val() || {};

                const hoy = new Date();
                const hoyStr = hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0') + '-' + String(hoy.getDate()).padStart(2, '0');
                
                if (d.ultimaFechaAcceso !== hoyStr) {
                    if (d.ultimaFechaAcceso) {
                        const fechaAnt = new Date(d.ultimaFechaAcceso + "T00:00:00");
                        const fechaHoy = new Date(hoyStr + "T00:00:00");
                        const diffTiempo = Math.abs(fechaHoy - fechaAnt);
                        const diasPasados = Math.floor(diffTiempo / (1000 * 60 * 60 * 24));
                        
                        if (diasPasados >= 1) {
                            let nuevaDeuda = parseFloat(d.deuda || 0) + (diasPasados * 1.00);
                            if (nuevaDeuda > 5.00) nuevaDeuda = 5.00;
                            let nuevoEstado = d.estado || "activo";
                            if (nuevaDeuda > 0) nuevoEstado = "bloqueado";
                            
                            db.ref('conductores/' + miCel).update({
                                totalGeneradoHoy: 0,
                                deuda: nuevaDeuda.toFixed(2),
                                estado: nuevoEstado,
                                ultimaFechaAcceso: hoyStr
                            });
                            return;
                        }
                    } else {
                        db.ref('conductores/' + miCel).update({ ultimaFechaAcceso: hoyStr });
                        return;
                    }
                }

                miEstado = d.estado || "activo";
                miConectado = d.conectado || false;

                document.getElementById('deuda-valor').innerText = "B/. " + parseFloat(d.deuda || 0).toFixed(2);
                document.getElementById('hoy-valor').innerText = "B/. " + parseFloat(d.totalGeneradoHoy || 0).toFixed(2);
                
                const statusTxt = document.getElementById('status-text');
                const checkStatus = document.getElementById('check-status');
                
                if(miEstado === "bloqueado") {
                    statusTxt.innerText = "BLOQUEADO (PAGA TU DEUDA)";
                    statusTxt.style.color = "#ff4444";
                    checkStatus.checked = false;
                    checkStatus.disabled = true;
                } else {
                    checkStatus.disabled = false;
                    checkStatus.checked = miConectado;
                    if(miConectado) {
                        statusTxt.innerText = "ESTÁS ACTIVO";
                        statusTxt.style.color = "#25d366";
                    } else {
                        statusTxt.innerText = "DESCONECTADO";
                        statusTxt.style.color = "#ff4d4d";
                    }
                }
                renderizarViajes();
            });

            db.ref('viajes').on('value', snap => {
                viajesSnapshot = snap;
                renderizarViajes();
            });
        }

        function toggleConexion(el) {
            silbido.play().then(() => { silbido.pause(); silbido.currentTime = 0; }).catch(e => {});
            db.ref('conductores/' + miCel).update({ conectado: el.checked });
        }

        function renderizarViajes() {
            const lista = document.getElementById('lista-viajes');
            
            if (!miConectado && miEstado !== "bloqueado") {
                lista.innerHTML = '<p style="text-align:center; color:#444;">Ponte en línea para recibir pedidos</p>';
                return;
            }

            if (!viajesSnapshot) {
                lista.innerHTML = '<p style="text-align:center; color:#333;">Esperando viajes...</p>';
                return;
            }

            let html = "";
            let hayPendientes = false;

            viajesSnapshot.forEach(child => {
                const v = child.val();
                
                if (v.estado === "pendiente") {
                    hayPendientes = true;
                    if(ultimoViajeId !== child.key) {
                        silbido.play().catch(e => {});
                        ultimoViajeId = child.key;
                    }

                    let botonViaje = "";
                    if (miEstado === "bloqueado") {
                        botonViaje = `<button class="btn" style="background:#444; color:#888; cursor:not-allowed;" disabled>❌ BLOQUEADO POR DEUDA</button>`;
                    } else {
                        botonViaje = `<button class="btn btn-ok" onclick="tomarViaje('${child.key}')">ACEPTAR VIAJE</button>`;
                    }

                    html += `
                        <div class="viaje-card">
                            <p><b>📍 Recoger en:</b> ${v.origen}</p>
                            <p><b>🏁 Destino:</b> ${v.destino}</p>
                            <p><b>💰 Tarifa:</b> B/. ${parseFloat(v.precio).toFixed(2)}</p>
                            ${botonViaje}
                        </div>`;
                }

                if (v.estado === "en curso" && v.conductorCel === miCel) {
                    let celPasajero = String(v.clienteCel || "").replace(/\D/g, '');
                    if(celPasajero.length === 8) celPasajero = "507" + celPasajero;

                    html = `
                        <div class="viaje-card" style="border-left-color: #25d366; background: #fff; color: #000;">
                            <p><b>👤 Cliente:</b> ${v.cliente}</p>
                            <p><b>📍 Recoger en:</b> ${v.origen}</p>
                            <p style="font-size: 20px;"><b>Total: B/. ${v.precio}</b></p>
                            <a href="https://wa.me/${celPasajero}?text=Hola%20${v.cliente},%20soy%20tu%20conductor%20de%20ClickGoTaxi%20estoy%20en%20camino" class="btn btn-ws" target="_blank">HABLAR POR WHATSAPP</a>
                            <button class="btn btn-ok" style="background:#000; color:#fff;" onclick="finalizarViaje('${child.key}', ${v.precio})">FINALIZAR VIAJE</button>
                            <button class="btn btn-cancel" onclick="cancelarViaje('${child.key}')">CANCELAR</button>
                        </div>`;
                }
            });

            if(!hayPendientes) ultimoViajeId = "";
            lista.innerHTML = html || '<p style="text-align:center; color:#333;">Esperando viajes...</p>';
        }

        function tomarViaje(id) {
            if(miEstado === "bloqueado") {
                alert("🔒 Tu cuenta está bloqueada por deuda. Salda tu cuenta para tomar carreras.");
                return;
            }
            db.ref('conductores/' + miCel).once('value', s => {
                const d = s.val();
                db.ref('viajes/' + id).update({
                    estado: 'en curso',
                    conductorCel: miCel,
                    conductorNombre: d.nombre,
                    conductorPlaca: d.placa
                });
            });
        }

        function finalizarViaje(id, precio) {
            if(!confirm("¿Finalizar viaje?")) return;
            const p = parseFloat(precio);
            
            db.ref('viajes/' + id).update({ estado: 'completado' }).then(() => {
                db.ref('conductores/' + miCel).once('value', s => {
                    const dc = s.val();
                    db.ref('conductores/' + miCel).update({
                        totalGeneradoHoy: (parseFloat(dc.totalGeneradoHoy || 0) + p).toFixed(2)
                    });
                });
            });
        }

        function cancelarViaje(id) {
            if(confirm("¿Cancelar este viaje?")) db.ref('viajes/' + id).update({ estado: 'pendiente', conductorCel: null });
        }
    </script>
</body>
</html>
