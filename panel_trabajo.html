<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel PreetyTaxi</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffc107">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; padding-top: env(safe-area-inset-top); }
        .billetera { background: linear-gradient(145deg, #1a1a1a, #000); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; margin-bottom: 20px; }
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25d366; }
        input:checked + .slider:before { transform: translateX(26px); }
        .viaje-card { background: #111; padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 2px solid #ffc107; animation: notify 0.5s infinite alternate; }
        @keyframes notify { from { border-color: #222; } to { border-color: #ffc107; } }
        .btn-aceptar { background: #ffc107; color: #000; padding: 14px; width: 100%; border-radius: 14px; font-weight: bold; border: none; margin-top: 10px; font-size: 16px; }
        .btn-alertas { background: #222; color: #ffc107; border: 1px dashed #ffc107; padding: 10px; border-radius: 12px; font-size: 11px; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body onload="cargar()">

    <div class="status-bar">
        <span id="status-text">DESCONECTADO</span>
        <label class="switch">
            <input type="checkbox" id="check-status" onchange="toggleConexion(this)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="billetera">
        <div id="lbl-cel" style="font-size: 10px; opacity: 0.5; margin-bottom: 8px;">---</div>
        <div style="display:flex; justify-content: space-around;">
            <div><small style="color:#888;">GANANCIA</small><div id="txt-ventas" class="monto">B/. 0.00</div></div>
            <div><small style="color:#888;">CUOTA</small><div id="txt-deuda" class="monto" style="color:#ff4d4d;">B/. 0.00</div></div>
        </div>
        <button class="btn-alertas" onclick="activarMotor()">🔔 ACTIVAR ALERTAS EN BOLSILLO</button>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    const sonidoAlerta = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    let ultimoViajeId = "";
    let wakeLock = null;

    // --- REGISTRO DEL MOTOR PWA ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log("Motor PreetyTaxi Registrado");
        }).catch(err => console.log("Error de motor:", err));
    }

    // Función obligatoria para pedir permisos
    function activarMotor() {
        if (!('Notification' in window)) {
            alert("Este celular no soporta notificaciones.");
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                // "Despierta" el sonido para que el navegador lo permita después
                sonidoAlerta.play().then(() => sonidoAlerta.pause());
                alert("✅ ¡Listo! Recibirás viajes con la pantalla apagada.");
            } else {
                alert("Bloqueaste las notificaciones. Ve a ajustes de Chrome y permítelas.");
            }
        });
    }

    // Wake Lock para mantener pantalla encendida si la app está al frente
    const requestWakeLock = async () => {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    };

    function cargar() {
        if(!miCel) return window.location.href="login.html";
        document.getElementById('lbl-cel').innerText = "CHOFER: " + miCel;
        
        db.ref('conductores/' + miCel).on('value', s => {
            const d = s.val() || {};
            document.getElementById('txt-ventas').innerText = "B/. " + (parseFloat(d.totalGeneradoHoy) || 0).toFixed(2);
            document.getElementById('txt-deuda').innerText = "B/. " + (parseFloat(d.deuda) || 0).toFixed(2);
            document.getElementById('check-status').checked = d.conectado || false;
            
            const statusTxt = document.getElementById('status-text');
            statusTxt.innerText = d.conectado ? "ESTÁS ACTIVO" : "DESCONECTADO";
            statusTxt.style.color = d.conectado ? "#25d366" : "#ff4d4d";

            if(d.conectado) {
                escucharViajes();
                requestWakeLock();
            } else {
                document.getElementById('lista-viajes').innerHTML = '<p style="text-align:center; color:#444;">Ponte en línea</p>';
                db.ref('viajes').off();
                if(wakeLock) wakeLock.release();
            }
        });
    }

    function toggleConexion(el) {
        db.ref('conductores/' + miCel).update({ conectado: el.checked });
    }

    function escucharViajes() {
        // Usamos .limitToLast(5) para que Firebase responda más rápido
        db.ref('viajes').limitToLast(5).on('value', snap => {
            const lista = document.getElementById('lista-viajes');
            let html = ""; let hayViajes = false;

            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    hayViajes = true;
                    
                    if(ultimoViajeId !== child.key) {
                        // 1. Sonido normal si la pantalla está encendida
                        sonidoAlerta.play().catch(e => console.log("Audio bloqueado"));
                        
                        // 2. Notificación Local (SW) que vibra en segundo plano
                        if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
                            navigator.serviceWorker.ready.then(reg => {
                                reg.showNotification("🚕 ¡NUEVO PEDIDO PREETY!", {
                                    body: `B/. ${v.precio} - Recoger en: ${v.origen}`,
                                    icon: "icon.png",
                                    vibrate: [500, 110, 500, 110, 450],
                                    tag: "taxi-alert",
                                    renotify: true
                                });
                            });
                        }
                        
                        ultimoViajeId = child.key;
                        if(navigator.vibrate) navigator.vibrate([300, 100, 300]);
                    }

                    html += `<div class="viaje-card">
                        <div style="display:flex; justify-content:space-between"><span>📍 PEDIDO DISPONIBLE</span><b style="color:#ffc107;">B/. ${v.precio}</b></div>
                        <div style="font-size:14px; margin: 10px 0;">Origen: ${v.origen}</div>
                        <button class="btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR VIAJE</button>
                    </div>`;
                }
                // (Omití la parte de 'en curso' para simplificar el código, mantenla de tu versión anterior)
            });
            
            if(!hayViajes) {
                ultimoViajeId = "";
                lista.innerHTML = '<p style="text-align:center; color:#333;">Esperando viajes...</p>';
            } else {
                lista.innerHTML = html;
            }
        });
    }

    function aceptar(id) {
        db.ref('conductores/' + miCel).once('value', s => {
            const d = s.val() || {};
            db.ref('viajes/' + id).update({ 
                estado: 'en curso', 
                conductorCel: miCel, 
                conductorNombre: d.nombre || "Chofer", 
                conductorPlaca: d.placa || "S/P" 
            });
        });
    }
</script>
</body>
</html>
