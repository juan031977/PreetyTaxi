<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Trabajo - PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .billetera { background: linear-gradient(145deg, #1a1a1a, #000); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; margin-bottom: 20px; }
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25d366; }
        input:checked + .slider:before { transform: translateX(26px); }
        .viaje-card { background: #111; padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #222; animation: notify 0.5s infinite alternate; }
        @keyframes notify { from { border-color: #222; } to { border-color: #ffc107; } }
        .btn-aceptar { background: #ffc107; color: #000; padding: 14px; width: 100%; border-radius: 14px; font-weight: bold; border: none; margin-top: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn-fin { background: #fff; color: #000; }
        /* Aviso de permisos que no bloquea */
        #aviso-permiso { display: none; background: #ffc107; color: #000; padding: 10px; text-align: center; font-size: 12px; font-weight: bold; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body onload="cargar()">

    <div id="aviso-permiso" onclick="solicitarPermisos()">
        ⚠️ TOCA AQUÍ PARA ACTIVAR EL SILBIDO Y ALERTAS
    </div>

    <div class="status-bar">
        <span id="status-text">Conectando...</span>
        <label class="switch">
            <input type="checkbox" id="check-status" onchange="toggleConexion(this)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="billetera">
        <div id="lbl-cel" style="font-size: 10px; opacity: 0.5; margin-bottom: 8px;">---</div>
        <div style="display:flex; justify-content: space-around;">
            <div><small style="color:#888;">GANANCIA</small><div id="txt-ventas" class="monto">B/. 0.00</div></div>
            <div><small style="color:#888;">CUOTA</small><div id="txt-deuda" class="monto" style="color:#ff4d4d;">B/. 0.00</div></div>
        </div>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    const sonidoAlerta = new Audio('https://raw.githubusercontent.com/juan031977/PreetyTaxi/main/silbido.mp3');
    let ultimoViajeId = "";

    function solicitarPermisos() {
        Notification.requestPermission().then(perm => {
            if(perm === 'granted') document.getElementById('aviso-permiso').style.display = 'none';
        });
    }

    function cargar() {
        if(!miCel) return window.location.href="login.html";
        document.getElementById('lbl-cel').innerText = "CHOFER: " + miCel;

        // Mostrar aviso solo si no hay permiso, pero no bloquear la carga
        if (Notification.permission !== "granted") {
            document.getElementById('aviso-permiso').style.display = 'block';
        }

        // Registro silencioso del Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log("SW Error"));
        }
        
        // Carga de datos de Firebase (Esto es lo que se quedaba pegado)
        db.ref('conductores/' + miCel).on('value', s => {
            const d = s.val() || {};
            document.getElementById('txt-ventas').innerText = "B/. " + (parseFloat(d.totalGeneradoHoy) || 0).toFixed(2);
            document.getElementById('txt-deuda').innerText = "B/. " + (parseFloat(d.deuda) || 0).toFixed(2);
            document.getElementById('check-status').checked = d.conectado || false;
            
            actualizarEstadoUI(d.conectado);

            if(d.conectado) escucharViajes();
            else {
                document.getElementById('lista-viajes').innerHTML = '<p style="text-align:center; color:#444;">Desconectado</p>';
                db.ref('viajes').off();
            }
        }, (error) => {
            document.getElementById('status-text').innerText = "Error de Red";
        });
    }

    function actualizarEstadoUI(conectado) {
        const statusTxt = document.getElementById('status-text');
        statusTxt.innerText = conectado ? "ESTÁS ACTIVO" : "DESCONECTADO";
        statusTxt.style.color = conectado ? "#25d366" : "#ff4d4d";
    }

    function toggleConexion(el) {
        // Truco para desbloquear el audio en Android al tocar el switch
        sonidoAlerta.play().then(() => { sonidoAlerta.pause(); sonidoAlerta.currentTime = 0; }).catch(e => {});
        
        db.ref('conductores/' + miCel).update({ conectado: el.checked });
        actualizarEstadoUI(el.checked);
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            const lista = document.getElementById('lista-viajes');
            let html = ""; let hay = false;

            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    hay = true;
                    if(ultimoViajeId !== child.key) {
                        sonidoAlerta.play().catch(e => {});
                        if ('setAppBadge' in navigator) navigator.setAppBadge(1).catch(e => {});
                        ultimoViajeId = child.key;
                    }
                    html += `<div class="viaje-card">
                        <div style="display:flex; justify-content:space-between"><span>📍 NUEVO PEDIDO</span><b>B/. ${v.precio}</b></div>
                        <div style="font-size:14px; margin: 10px 0;">${v.origen} ➔ ${v.destino}</div>
                        <button class="btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR VIAJE</button>
                    </div>`;
                } else if(v.estado === "en curso" && v.conductorCel === miCel) {
                    hay = true;
                    if ('setAppBadge' in navigator) navigator.clearAppBadge().catch(e => {});
                    html += `<div class="viaje-activo" style="background:#fff; color:#000; padding:20px; border-radius:20px;">
                        <h2>${v.cliente}</h2>
                        <p>${v.origen}</p>
                        <button class="btn btn-fin" onclick="finalizar('${child.key}')">FINALIZAR</button>
                    </div>`;
                }
            });
            if(!hay) {
                ultimoViajeId = "";
                lista.innerHTML = '<p style="text-align:center; color:#333;">Esperando viajes...</p>';
            } else {
                lista.innerHTML = html;
            }
        });
    }

    function aceptar(id) {
        db.ref('viajes/' + id).update({ estado: 'en curso', conductorCel: miCel });
    }

    function finalizar(id) {
        if(confirm("¿Finalizar viaje?")) db.ref('viajes/' + id).update({ estado: 'completado' });
    }

    // EL DESPERTADOR (WAKE LOCK) SIGUE AQUÍ, NO SE HA BORRADO
    if ('wakeLock' in navigator) {
        let wl = null;
        const requestWL = async () => {
            try { wl = await navigator.wakeLock.request('screen'); } catch (e) {}
        };
        requestWL();
    }
</script>
</body>
</html>
