<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PreetyTaxi - Panel de Trabajo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* EL MAPA DE FONDO IGUAL QUE EN PEDIR VIAJE */
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* INTERFAZ FLOTANTE */
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; }
        
        .header-status { pointer-events: auto; background: rgba(0,0,0,0.85); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffc107; }
        .billetera-mini { pointer-events: auto; background: rgba(26,26,26,0.9); padding: 10px; display: flex; justify-content: space-around; text-align: center; font-size: 12px; }
        .monto { color: #ffc107; font-weight: bold; font-size: 16px; }

        .lista-pedidos { pointer-events: auto; margin-top: auto; padding: 15px; max-height: 60%; overflow-y: auto; }
        
        .viaje-card { background: white; color: #000; padding: 15px; border-radius: 18px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-left: 8px solid #ffc107; }
        .btn-aceptar { width: 100%; padding: 15px; background: #ffc107; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-ws { background: #25d366; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 10px; margin-top: 5px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay">
        <div class="header-status">
            <div id="status-txt" style="color:#ff4d4d; font-weight:bold;">DESCONECTADO</div>
            <div id="lbl-cel" style="font-size:12px; color:#aaa;">---</div>
        </div>

        <div class="billetera-mini">
            <div>GANANCIA <div id="txt-ventas" class="monto">B/. 0.00</div></div>
            <div>CUOTA APP <div id="txt-deuda" class="monto" style="color:#ff4d4d;">B/. 0.00</div></div>
        </div>

        <div id="lista-viajes" class="lista-pedidos">
            </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    
    let map, ds, dr;

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: {lat: 8.9833, lng: -79.5167}, // Ciudad de Panamá
            zoom: 13,
            disableDefaultUI: true,
            styles: [ { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{"color": "#ffffff"}] } ] // Opcional: Modo oscuro manual
        });
        ds = new google.maps.DirectionsService();
        dr = new google.maps.DirectionsRenderer({ 
            map: map, 
            polylineOptions: { strokeColor: "#ffc107", strokeWeight: 5 } 
        });
        cargarDatos();
    }

    function cargarDatos() {
        if(!miCel) return window.location.href="login.html";
        document.getElementById('lbl-cel').innerText = miCel;

        db.ref('conductores/' + miCel).on('value', s => {
            const d = s.val() || {};
            document.getElementById('txt-ventas').innerText = "B/. " + (parseFloat(d.totalGeneradoHoy) || 0).toFixed(2);
            document.getElementById('txt-deuda').innerText = "B/. " + (parseFloat(d.deuda) || 0).toFixed(2);
            
            const statusTxt = document.getElementById('status-txt');
            if(d.conectado) {
                statusTxt.innerText = "EN LÍNEA"; statusTxt.style.color = "#25d366";
                escucharViajes();
            } else {
                statusTxt.innerText = "DESCONECTADO"; statusTxt.style.color = "#ff4d4d";
                db.ref('viajes').off();
                document.getElementById('lista-viajes').innerHTML = '<div style="background:rgba(0,0,0,0.7); padding:20px; border-radius:10px; text-align:center;">Ponte en línea en el menú</div>';
            }
        });
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            const lista = document.getElementById('lista-viajes');
            let html = "";
            
            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    html += `
                        <div class="viaje-card" onclick="verRuta('${v.origen}', '${v.destino}')">
                            <div style="display:flex; justify-content:space-between">
                                <b>NUEVO PEDIDO</b>
                                <b style="font-size:18px;">B/. ${v.precio}</b>
                            </div>
                            <h3 style="margin:5px 0;">${v.cliente}</h3>
                            <p style="font-size:12px; margin:2px 0;">📍 ${v.origen}</p>
                            <p style="font-size:12px; margin:2px 0;">🏁 ${v.destino}</p>
                            <small style="color:blue;">(Toca aquí para ver ruta en el mapa)</small>
                            
                            <a href="https://wa.me/507${v.telefono}" class="btn-ws">CHATEAR POR WHATSAPP</a>
                            <button class="btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR VIAJE</button>
                        </div>
                    `;
                }
            });
            lista.innerHTML = html || '<p style="text-align:center;">Esperando viajes...</p>';
        });
    }

    function verRuta(ori, des) {
        ds.route({
            origin: ori + ", Panama",
            destination: des + ", Panama",
            travelMode: 'DRIVING'
        }, (res, stat) => {
            if (stat === 'OK') {
                dr.setDirections(res);
                // Ajustar el zoom automáticamente para que se vea toda la ruta
                const bounds = res.routes[0].bounds;
                map.fitBounds(bounds);
            }
        });
    }

    function aceptar(id) {
        db.ref('conductores/' + miCel).once('value', s => {
            const d = s.val() || {};
            db.ref('viajes/' + id).update({ 
                estado: 'en curso', 
                conductorCel: miCel, 
                conductorNombre: d.nombre || "Chofer", 
                conductorPlaca: d.placa || "T-000" 
            });
        });
    }

    window.onload = initMap;
</script>
</body>
</html>
