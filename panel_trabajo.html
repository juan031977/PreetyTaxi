<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Trabajo - PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .viaje-card { background: #fff; color: #000; padding: 18px; border-radius: 20px; margin-bottom: 12px; border-left: 10px solid #ffc107; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn-mapa { background: #4285F4; color: white; } /* AZUL GOOGLE */
        .btn-ws { background: #25d366; color: white; }
        .btn-aceptar { background: #ffc107; color: #000; font-size: 18px; margin-top: 15px; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 12px 20px; border-radius: 50px; border: 1px solid #333; margin-bottom: 15px; }
    </style>
</head>
<body onload="cargar()">
    <div class="status-bar">
        <span id="status-text">Cargando...</span>
        <div id="lbl-cel" style="font-size: 10px; opacity: 0.5;">---</div>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');

    function cargar() {
        if(!miCel) return window.location.href="login.html";
        document.getElementById('lbl-cel').innerText = miCel;
        escucharViajes();
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            const lista = document.getElementById('lista-viajes');
            let html = ""; let hay = false;

            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    hay = true;
                    
                    // ESTA ES LA MAGIA PARA EL MÓVIL:
                    // Google Maps "Intent" que abre la App instalada en el Android
                    const linkRutaMovil = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(v.origen + ", Panama")}&destination=${encodeURIComponent(v.destino + ", Panama")}&travelmode=driving`;
                    
                    const textoChat = `Hola ${v.cliente}, soy de PreetyTaxi. ¿Sigue disponible el viaje?`;

                    html += `<div class="viaje-card">
                        <div style="display:flex; justify-content:space-between"><b>NUEVO PEDIDO</b> <b style="font-size:18px;">B/. ${v.precio}</b></div>
                        <h3 style="margin:5px 0;">${v.cliente}</h3>
                        <p style="font-size:13px; margin:2px 0;">📍 <b>Origen:</b> ${v.origen}</p>
                        <p style="font-size:13px; margin:2px 0;">🏁 <b>Destino:</b> ${v.destino}</p>
                        
                        <a href="${linkRutaMovil}" target="_blank" class="btn btn-mapa">
                            <i class="fas fa-directions"></i> VER RECORRIDO (ABRIR MAPS)
                        </a>

                        <a href="https://wa.me/507${v.telefono}?text=${encodeURIComponent(textoChat)}" class="btn btn-ws">
                            <i class="fab fa-whatsapp"></i> PREGUNTAR POR WHATSAPP
                        </a>
                        
                        <button class="btn btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR VIAJE</button>
                    </div>`;
                }
            });
            lista.innerHTML = hay ? html : '<p style="text-align:center; color:#444;">Esperando viajes...</p>';
        });
    }

    function aceptar(id) {
        db.ref('conductores/' + miCel).once('value', s => {
            const d = s.val() || {};
            db.ref('viajes/' + id).update({ estado: 'en curso', conductorCel: miCel, conductorNombre: d.nombre, conductorPlaca: d.placa });
        });
    }
</script>
</body>
</html>
