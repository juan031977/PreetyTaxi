<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel PreetyTaxi</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; text-align: center; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 50px; border: 1px solid #333; margin-bottom: 20px; }
        .viaje-card { background: #111; padding: 20px; border-radius: 20px; border: 2px solid #ffc107; margin-top: 15px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { border-color: #ffc107; } 50% { border-color: #333; } }
        .btn-aceptar { background: #ffc107; color: #000; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; border: none; font-size: 18px; margin-top: 10px; }
        .btn-activar { background: #222; color: #ffc107; border: 1px dashed #ffc107; padding: 10px; width: 100%; border-radius: 12px; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body onload="cargar()">

    <div class="status-bar">
        <span id="status-text" style="font-weight: bold;">CARGANDO...</span>
        <button id="btn-power" onclick="toggleConexion()" style="background:none; border:none; font-size:35px; color:#444;"><i class="fas fa-power-off"></i></button>
    </div>

    <div style="background:#111; padding:20px; border-radius:24px; border:1px solid #333;">
        <div style="display:flex; justify-content: space-around;">
            <div><small>HOY</small><div id="txt-ventas" style="color:#ffc107; font-size:24px; font-weight:bold;">B/. 0.00</div></div>
            <div><small>CUOTA</small><div id="txt-deuda" style="color:#ff4d4d; font-size:24px; font-weight:bold;">B/. 0.00</div></div>
        </div>
        <button class="btn-activar" onclick="pedirPermisos()">🔔 ACTIVAR ALERTAS (OBLIGATORIO)</button>
    </div>

    <div id="lista-viajes"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miCel = localStorage.getItem('driverCel');
    const sonidoAlerta = new Audio('alerta.mp3?v=' + Date.now());
    let conectado = false;

    // REGISTRO DEL MOTOR
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log("Motor listo");
            reg.update();
        });
    }

    function pedirPermisos() {
        Notification.requestPermission().then(perm => {
            if(perm === 'granted') {
                sonidoAlerta.play().then(() => { sonidoAlerta.pause(); alert("✅ Sonido y Alertas Listos."); });
            }
        });
    }

    function cargar() {
        if(!miCel) return window.location.href="login.html";
        
        db.ref('conductores/' + miCel).on('value', snap => {
            const d = snap.val() || {};
            conectado = d.conectado || false;
            document.getElementById('txt-ventas').innerText = "B/. " + (d.totalGeneradoHoy || 0);
            document.getElementById('txt-deuda').innerText = "B/. " + (d.deuda || 0);
            document.getElementById('status-text').innerText = conectado ? "EN LÍNEA" : "DESCONECTADO";
            document.getElementById('status-text').style.color = conectado ? "#25d366" : "#ff4d4d";
            document.getElementById('btn-power').style.color = conectado ? "#25d366" : "#444";

            if(conectado) escucharViajes();
        });
    }

    function toggleConexion() {
        db.ref('conductores/' + miCel).update({ conectado: !conectado });
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            let html = ""; let hay = false;
            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "buscando") {
                    hay = true;
                    // SI HAY VIAJE, FORZAMOS SONIDO Y NOTIFICACIÓN
                    sonidoAlerta.play().catch(() => {});
                    enviarNotificacion(v.origen, v.precio);
                    
                    html += `<div class="viaje-card">
                        <b>🚕 ¡NUEVO PEDIDO!</b><br>
                        <p>${v.origen}</p>
                        <div style="font-size:22px; color:#ffc107;">B/. ${v.precio}</div>
                        <button class="btn-aceptar" onclick="aceptar('${child.key}')">ACEPTAR</button>
                    </div>`;
                }
            });
            document.getElementById('lista-viajes').innerHTML = hay ? html : "<p style='color:#333; margin-top:20px;'>Buscando...</p>";
        });
    }

    function enviarNotificacion(origen, precio) {
        if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification("🚕 PREETY TAXI", {
                    body: `B/. ${precio} en ${origen}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/71/71222.png",
                    vibrate: [500, 100, 500],
                    tag: "alerta-viaje",
                    renotify: true
                });
            });
        }
    }

    function aceptar(id) {
        db.ref('viajes/' + id).update({ estado: 'en curso', conductorCel: miCel });
    }
</script>
</body>
</html>
