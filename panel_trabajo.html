<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Trabajo - PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .billetera { background: linear-gradient(145deg, #1a1a1a, #000); padding: 20px; border-radius: 24px; border: 1px solid #333; margin-bottom: 15px; text-align: center; }
        .monto { color: #ffc107; font-size: 26px; font-weight: bold; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 10px 20px; border-radius: 50px; margin-bottom: 20px; border: 1px solid #333; }
        
        /* CARD DE VIAJE MEJORADA */
        .viaje-card { background: #1a1a1a; padding: 20px; border-radius: 20px; border-left: 5px solid #ffc107; margin-bottom: 15px; animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #ffc107; } to { box-shadow: 0 0 20px #ffc107; } }
        
        .btn-accion { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }
        .btn-aceptar { background: #ffc107; color: #000; }
        .btn-finalizar { background: #28a745; color: #fff; }
        
        .toggle-btn { width: 50px; height: 25px; background: #333; border-radius: 25px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle-btn.on { background: #28a745; }
        .toggle-btn::before { content: ''; position: absolute; width: 21px; height: 21px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-btn.on::before { left: 27px; }
    </style>
</head>
<body>

<audio id="audioSilbido" src="https://www.soundjay.com/communication/sounds/whistle-01.mp3" preload="auto"></audio>

<div class="billetera">
    <p style="margin:0; color:#888; font-size:14px;">Ganancia de Hoy</p>
    <div class="monto">B/. <span id="ganancia-hoy">0.00</span></div>
    <p style="margin:5px 0 0 0; color:#ff4444; font-size:12px;">Cuota Pendiente: B/. <span id="deuda-total">0.00</span></p>
</div>

<div class="status-bar">
    <span>Estatus: <strong id="txt-status" style="color:#888;">OFFLINE</strong></span>
    <div class="toggle-btn" id="btn-status" onclick="toggleOnline()"></div>
</div>

<div id="contenedor-viajes">
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
        databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const miCel = localStorage.getItem('driverCel');
    let miInfo = null;
    let esOnline = false;
    let viajesVistos = new Set();

    db.ref('conductores/' + miCel).on('value', snap => {
        miInfo = snap.val();
        if(miInfo) {
            document.getElementById('ganancia-hoy').innerText = parseFloat(miInfo.totalGeneradoHoy || 0).toFixed(2);
            document.getElementById('deuda-total').innerText = parseFloat(miInfo.deuda || 0).toFixed(2);
        }
    });

    function toggleOnline() {
        if(miInfo && miInfo.estado === "bloqueado") return alert("❌ Acceso bloqueado. Contacta al Admin.");
        esOnline = !esOnline;
        actualizarUIStatus();
    }

    function actualizarUIStatus() {
        const btn = document.getElementById('btn-status');
        const txt = document.getElementById('txt-status');
        if(esOnline) {
            btn.classList.add('on');
            txt.innerText = "ONLINE";
            txt.style.color = "#28a745";
            escucharViajes();
        } else {
            btn.classList.remove('on');
            txt.innerText = "OFFLINE";
            txt.style.color = "#888";
            document.getElementById('contenedor-viajes').innerHTML = "";
            db.ref('viajes').off();
        }
    }

    function escucharViajes() {
        db.ref('viajes').on('value', snap => {
            if(!esOnline) return;
            const container = document.getElementById('contenedor-viajes');
            container.innerHTML = "";
            
            snap.forEach(child => {
                const v = child.val();
                
                // --- LÓGICA DEL SILBIDO ---
                if(v.estado === "esperando" && !viajesVistos.has(child.key)) {
                    document.getElementById('audioSilbido').play().catch(e => console.log("Esperando interacción para audio"));
                    viajesVistos.add(child.key);
                }

                if(v.estado === "esperando" || (v.estado === "en curso" && v.conductorCel === miCel)) {
                    const card = document.createElement('div');
                    card.className = "viaje-card";
                    card.innerHTML = `
                        <div style="margin-bottom:10px;">
                            <span style="color:#ffc107; font-size:12px; font-weight:bold;">NUEVO PEDIDO</span>
                            <h2 style="margin:5px 0; font-size:22px;">🏁 ${v.destino}</h2>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:24px; font-weight:bold; color:#fff;">B/. ${parseFloat(v.monto).toFixed(2)}</span>
                            <span style="color:#888;">Distancia: Tarifario</span>
                        </div>
                        ${v.estado === "esperando" ? 
                            `<button class="btn-accion btn-aceptar" onclick="aceptarViaje('${child.key}')">ACEPTAR CARRERA</button>` : 
                            `<button class="btn-accion btn-finalizar" onclick="finalizarViaje('${child.key}', ${v.monto})">FINALIZAR Y COBRAR</button>`
                        }
                    `;
                    container.appendChild(card);
                }
            });
        });
    }

    function aceptarViaje(id) {
        db.ref('viajes/' + id).update({
            estado: "en curso",
            conductorNombre: miInfo.nombre,
            conductorCel: miCel,
            conductorPlaca: miInfo.placa
        });
    }

    function finalizarViaje(id, montoTotal) {
        const cuotaApp = 0.50; 
        const gananciaLimpia = montoTotal - cuotaApp;
        const fecha = new Date();
        const hoy = fecha.getDate() + "-" + (fecha.getMonth() + 1) + "-" + fecha.getFullYear();

        const updates = {};
        updates['viajes/' + id + '/estado'] = 'completado';
        updates['reportes_diarios/' + miCel + '/' + hoy + '/' + id] = {
            monto: montoTotal,
            cuota: cuotaApp,
            hora: fecha.toLocaleTimeString(),
            destino: "Tarifario"
        };

        db.ref().update(updates).then(() => {
            db.ref('conductores/' + miCel).once('value', s => {
                const d = s.val();
                db.ref('conductores/' + miCel).update({
                    totalGeneradoHoy: (parseFloat(d.totalGeneradoHoy || 0) + gananciaLimpia).toFixed(2),
                    deuda: (parseFloat(d.deuda || 0) + cuotaApp).toFixed(2)
                });
            });
            alert("¡Viaje completado!");
        });
    }
</script>
</body>
</html>
