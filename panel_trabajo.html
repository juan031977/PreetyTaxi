<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Trabajo - ClickGoTaxi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #000; color: #fff; padding: 20px; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #FFC107; border: 1px solid #333; transition: 0.3s; }
        .info-row { margin: 10px 0; font-size: 16px; }
        .precio { color: #FFC107; font-size: 32px; font-weight: bold; margin: 15px 0; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 8px 0; transition: 0.2s; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        label { font-size: 12px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .btn-conexion { font-size: 18px; letter-spacing: 0.5px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-iniciar { background: #28a745; color: white; }
        .btn-finalizar { background: #dc3545; color: white; }
        .btn-editar { background: #444; color: white; padding: 8px; font-size: 14px; width: auto; border-radius: 5px; margin-top: 10px; }
        .btn-volver { position: absolute; top: 5px; left: 15px; background: transparent; color: #aaa; border: none; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 20; width: auto; padding: 0; margin: 0; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- SONIDO DE NOTIFICACIÓN -->
    <audio id="sonidoNotificacion" preload="auto">
        <source src="https://raw.githubusercontent.com/juan031977/PreetyTaxi/main/silbido.mp3" type="audio/mpeg">
        <source src="https://assets.mixkit.co/sfx/preview/2320/2320-preview.mp3" type="audio/mpeg">
    </audio>

    <button class="btn-volver" onclick="window.history.back()">⬅ Volver</button>

    <div class="header">
        <div>
            <div id="txtEstado" style="font-size: 16px;">Verificando estado...</div>
            <div style="margin-top: 5px;">Conductor: <strong id="nombreConductor">Cargando...</strong></div>
            <button class="btn-editar" onclick="mostrarFormulario()">✏️ Editar mis datos</button>
        </div>
        <div>
            <div style="font-size: 12px; color: #aaa;">GANANCIA HOY</div>
            <span id="ganancia" style="font-size: 18px; font-weight: bold; color: #FFC107;">B/. 0.00</span>
        </div>
    </div>

    <button id="btnConexion" class="btn-conexion" onclick="toggleConexion()">🔄 Sincronizando...</button>

    <div id="formularioDatos" class="card" style="display: none; border-left: 4px solid #007bff;">
        <h3 style="margin-bottom: 15px; color: #007bff;">Configura tus datos</h3>
        <label>Tu Nombre</label> <input type="text" id="inNombre" placeholder="Ej: Juan Pérez">
        <label>WhatsApp</label> <input type="tel" id="inTel" placeholder="Ej: 60000000">
        <label>Vehículo</label> <input type="text" id="inVehiculo" placeholder="Ej: Kia Picanto">
        <label>Color</label> <input type="text" id="inColor" placeholder="Ej: Blanco">
        <label>Placa</label> <input type="text" id="inPlaca" placeholder="Ej: AB1234">
        <button class="btn-iniciar" onclick="guardarDatos()">GUARDAR DATOS</button>
    </div>

    <div id="area-viajes"><div id="contenedor"></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const audio = document.getElementById('sonidoNotificacion');

        let audioListo = false;

        // Desbloquear audio al tocar la pantalla (necesario en móviles)
        document.addEventListener('touchstart', function desbloquear() {
            if (!audioListo) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    audioListo = true;
                    console.log("✅ Sonido desbloqueado");
                }).catch(() => {});
            }
        }, { once: true });

        function reproducirSonido() {
            if (audioListo) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Error al reproducir:", e));
            }
        }

        let datos = JSON.parse(localStorage.getItem('datos_conductor'));
        let adminEstado = 'pendiente'; 
        let conductorConectado = localStorage.getItem('conductor_conectado') === 'true'; 
        let estoyEnViajeActivo = false;

        if (!datos || !datos.telefono) { 
            mostrarFormulario(); 
        } else { 
            document.getElementById('nombreConductor').textContent = datos.nombre; 
            escucharEstadoAdmin(datos.telefono); 
        }

        function mostrarFormulario() { 
            document.getElementById('area-viajes').style.display = 'none'; 
            document.getElementById('formularioDatos').style.display = 'block'; 
        }

        function escucharEstadoAdmin(telefono) {
            db.ref('conductores/' + telefono).on('value', snap => {
                const conductorData = snap.val();
                adminEstado = conductorData ? (conductorData.estado || 'pendiente') : 'pendiente';
                actualizarInterfaz();
            });
        }

        function actualizarInterfaz() {
            const btnConexion = document.getElementById('btnConexion');
            if (adminEstado === 'bloqueado' || adminEstado === 'pendiente') {
                conductorConectado = false;
                document.getElementById('txtEstado').innerHTML = `<span style="color: #dc3545; font-weight: bold;">⛔ CUENTA BLOQUEADA</span>`;
                btnConexion.innerHTML = `❌ BLOQUEADO (Paga tu deuda)`;
                activarEscuchasDeViajes();
            } else {
                document.getElementById('txtEstado').innerHTML = `<span style="color: #28a745; font-weight: bold;">✅ CUENTA ACTIVA</span>`;
                if (conductorConectado) {
                    btnConexion.innerHTML = `🟢 CONECTADO (Toca para Desconectar)`;
                    activarEscuchasDeViajes();
                } else {
                    btnConexion.innerHTML = `⚪ DESCONECTADO (Modo Descanso)`;
                    document.getElementById('contenedor').innerHTML = '<div style="text-align:center; padding:35px; color:#666;">💤 Estás desconectado.</div>';
                    db.ref('viajes').off();
                }
            }
        }

        function toggleConexion() {
            if (adminEstado === 'bloqueado' || adminEstado === 'pendiente') {
                return alert("⛔ Tu cuenta está bloqueada por deuda.\nDebes pagar B/. 1.00 para poder aceptar viajes.");
            }
            conductorConectado = !conductorConectado;
            localStorage.setItem('conductor_conectado', conductorConectado);
            actualizarInterfaz();
        }

        function activarEscuchasDeViajes() {
            db.ref('viajes').off();
            document.getElementById('contenedor').innerHTML = '';
            
            if(datos && datos.telefono) {
                db.ref('viajes').orderByChild('conductorCel').equalTo(datos.telefono).on('value', (snap) => {
                    let hayViajeValido = false;
                    snap.forEach((child) => {
                        const v = child.val();
                        if(['conductor_asignado', 'conductor_llego', 'viaje_iniciado'].includes(v.estado)) {
                            hayViajeValido = true;
                            estoyEnViajeActivo = true;
                            renderizarActivo(child.key, v);
                        }
                    });
                    if (!hayViajeValido) document.getElementById('contenedor').innerHTML = '';
                });
            }

            db.ref('viajes').orderByChild('estado').equalTo('pendiente').on('child_added', (snap) => {
                if (!estoyEnViajeActivo) {
                    reproducirSonido();   // ← Sonido aquí
                    mostrarPedido(snap.key, snap.val());
                }
            });

            db.ref('viajes').orderByChild('estado').equalTo('pendiente').on('child_removed', (snap) => {
                const tarj = document.getElementById('pedido_' + snap.key);
                if (tarj) tarj.remove();
            });
        }

        function mostrarPedido(id, p) {
            if(document.getElementById('pedido_' + id)) return;

            const estaBloqueado = (adminEstado === 'bloqueado' || adminEstado === 'pendiente');

            const html = `<div class="card" id="pedido_${id}">
                <div class="info-row">👤 <strong>Cliente:</strong> ${p.pasajero_nombre || 'Cliente'}</div>
                <div class="info-row">📍 <strong>Origen:</strong> ${p.origen}</div>
                <div class="info-row">🏁 <strong>Destino:</strong> ${p.destino}</div>
                <div class="precio">Total: B/. ${p.precio || "0.00"}</div>
                ${p.metodo_pago ? `<div class="info-row" style="color:#ffc107;">💰 <strong>Pago:</strong> ${p.metodo_pago.toUpperCase()}</div>` : ''}
                
                ${estaBloqueado ? 
                    `<button style="background:#dc3545; color:white;" disabled>⛔ BLOQUEADO - PAGA TU DEUDA</button>` :
                    `<button style="background: #28a745; color: white;" onclick="aceptar('${id}')">✅ ACEPTAR VIAJE</button>`
                }
            </div>`;

            document.getElementById('contenedor').insertAdjacentHTML('beforeend', html);
        }

        window.aceptar = (id) => {
            if (adminEstado === 'bloqueado' || adminEstado === 'pendiente') {
                return alert("❌ No puedes aceptar viajes porque tu cuenta está bloqueada.");
            }
            db.ref('viajes/' + id).update({
                estado: 'conductor_asignado',
                conductorNombre: datos.nombre,
                conductorCel: datos.telefono,
                conductorVehiculo: datos.vehiculo,
                conductorColor: datos.color,
                conductorPlaca: datos.placa
            });
        };

        function renderizarActivo(id, v) {
            const esLlegada = v.estado === 'conductor_llego';
            const btnColor = esLlegada ? '#6c757d' : '#007bff';
            const btnTexto = esLlegada ? '✓ PASAJERO NOTIFICADO' : '📍 LLEGUÉ AL PUNTO';
            
            document.getElementById('contenedor').innerHTML = `
                <div class="card">
                    <div style="background:#28a745; padding:10px; border-radius:5px; text-align:center; margin-bottom:15px; font-weight:bold;">✅ VIAJE EN CURSO</div>
                    <div class="info-row">👤 <strong>Cliente:</strong> ${v.pasajero_nombre}</div>
                    <div class="info-row">📍 <strong>Origen:</strong> ${v.origen}</div>
                    <div class="precio">Total: B/. ${v.precio || "0.00"}</div>
                    ${v.metodo_pago ? `<div class="info-row">💰 Pago: ${v.metodo_pago.toUpperCase()}</div>` : ''}
                    
                    <button style="background:${btnColor}; color:white;" onclick="actualizar('${id}', 'conductor_llego')">${btnTexto}</button>
                    <button class="btn-whatsapp" onclick="window.open('https://wa.me/${v.telefono}')">💬 WHATSAPP</button>
                    <button class="btn-iniciar" onclick="actualizar('${id}', 'viaje_iniciado')">▶️ INICIAR VIAJE</button>
                    <button class="btn-finalizar" onclick="actualizar('${id}', 'completado')">🏁 FINALIZAR VIAJE</button>
                </div>
            `;
        }

        window.actualizar = (id, estado) => {
            db.ref('viajes/' + id).update({ estado: estado }).then(() => {
                if(estado === 'completado') {
                    document.getElementById('contenedor').innerHTML = '';
                    estoyEnViajeActivo = false;
                }
            });
        };
        
        function guardarDatos() {
            const tel = document.getElementById('inTel').value.replace(/[^0-9]/g, '');
            if(tel.length < 8) return alert("Número inválido");
            datos = { 
                nombre: document.getElementById('inNombre').value, 
                telefono: tel, 
                vehiculo: document.getElementById('inVehiculo').value, 
                color: document.getElementById('inColor').value, 
                placa: document.getElementById('inPlaca').value 
            };
            localStorage.setItem('datos_conductor', JSON.stringify(datos));
            db.ref('conductores/' + tel).update(datos).then(() => location.reload());
        }
    </script>
</body>
</html>
