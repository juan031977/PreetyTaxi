<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedir Taxi - PreetyTaxi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="panel-cliente">
        <h2>Solicitar Taxi</h2>
        <input type="text" id="origen" placeholder="¿Dónde estás?">
        <input type="text" id="destino" placeholder="¿A dónde vas?">
        <div id="precio">B/. 2.50</div>
        <button onclick="solicitarViaje()">PEDIR TAXI AHORA</button>
    </div>

    <div id="panel-espera" style="display:none;">
        <h2>Buscando conductor...</h2>
        <p>Tu solicitud ha sido enviada.</p>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
            databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function solicitarViaje() {
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            const precio = document.getElementById('precio').innerText.replace('B/. ', '');
            const miCel = localStorage.getItem('userCel') || "Sin Celular";
            const miNombre = localStorage.getItem('userName') || "Cliente";

            if (!origen || !destino) return alert("Indica origen y destino");

            const nuevoViaje = {
                cliente: miNombre,
                clienteCel: miCel,
                origen: origen,
                destino: destino,
                precio: precio,
                estado: "pendiente", // Clave para que el conductor lo vea
                timestamp: Date.now()
            };

            // Se guarda en la rama 'viajes'
            db.ref('viajes').push(nuevoViaje).then(() => {
                document.getElementById('panel-cliente').style.display = "none";
                document.getElementById('panel-espera').style.display = "block";
            });
        }
    </script>
</body>
</html>
