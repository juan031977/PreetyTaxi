<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>PreetyTaxi - Pedir Viaje</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg&libraries=places"></script>
    
    <style>
        /* BLOQUEO 2: ESCUDO CSS ANTI-REFRESCO */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Esto mata la flecha de Google Chrome de raíz */
            overscroll-behavior-y: none !important;
            overscroll-behavior: none !important;
            /* Fija la pantalla al cristal del celular */
            position: fixed;
            overflow: hidden !important;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
            -webkit-user-select: none;
        }

        /* Permitimos toques solo en elementos necesarios */
        #map, .ui-panel, input, button, .viaje-card, .box {
            touch-action: pan-x pan-y !important;
        }

        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-panel { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 420px; z-index: 10; 
        }

        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 -8px 25px rgba(0,0,0,0.25); border-top: 4px solid #ffc107; }
        input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; border: 1px solid #eee; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-yellow { background: #ffc107; color: #000; }
        .price-tag { font-size: 38px; font-weight: 900; color: #1a1a1a; text-align: center; margin: 5px 0; }
        .panel-espera { background: #1a1a1a; color: white; padding: 20px; border-radius: 20px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="ui-panel">
        <div class="box" id="panel-cliente">
            <input id="origen-input" type="text" placeholder="📍 ¿Dónde te buscamos?">
            <input id="destino-input" type="text" placeholder="🏁 ¿A dónde vas?">
            <div id="info-viaje" style="display:none; margin-top: 15px;">
                <div class="price-tag" id="precio-txt">B/. 1.75</div>
                <button class="btn btn-yellow" onclick="confirmarPedido()">PEDIR TAXI AHORA</button>
            </div>
        </div>
        <div id="panel-espera" class="panel-espera">
            <h3 id="status-label" style="color:#ffc107;">Buscando conductor...</h3>
            <button class="btn" style="background:transparent; color:#ff4d4d; font-size:13px;" onclick="cancelarViaje()">Cancelar Viaje</button>
        </div>
    </div>

<script>
    // BLOQUEO 3: SCRIPT MATA-GESTOS (EL "GUARDAESPALDAS")
    let touchStart = 0;
    document.addEventListener('touchstart', (e) => {
        touchStart = e.touches[0].pageY;
    }, {passive: false});

    document.addEventListener('touchmove', (e) => {
        let touchMove = e.touches[0].pageY;
        // Si intenta jalar hacia abajo estando en el tope
        if (touchMove > touchStart && window.scrollY <= 1) {
            // No permitimos el refresco a menos que sea un input
            if (e.target.tagName !== 'INPUT') {
                e.preventDefault();
            }
        }
    }, {passive: false});

    // Forzar el micro-scroll de seguridad
    window.addEventListener('load', () => { window.scrollTo(0, 1); });

    const firebaseConfig = { apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg", databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let map, ds, dr, viajeID, posA, posB;

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), { 
            center: {lat: 9.0415, lng: -79.4411}, zoom: 14, disableDefaultUI: true, gestureHandling: 'greedy' 
        });
        ds = new google.maps.DirectionsService();
        dr = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: false, polylineOptions: { strokeColor: "#ffc107", strokeWeight: 6 } });
        
        const acOri = new google.maps.places.Autocomplete(document.getElementById('origen-input'), { componentRestrictions: { country: "pa" } });
        const acDes = new google.maps.places.Autocomplete(document.getElementById('destino-input'), { componentRestrictions: { country: "pa" } });
        
        acOri.addListener('place_changed', () => { posA = acOri.getPlace().geometry.location; trazar(); });
        acDes.addListener('place_changed', () => { posB = acDes.getPlace().geometry.location; trazar(); });
    }

    function trazar() {
        if (!posA || !posB) return;
        ds.route({ origin: posA, destination: posB, travelMode: 'DRIVING' }, (res, stat) => {
            if (stat === 'OK') {
                dr.setDirections(res);
                const km = res.routes[0].legs[0].distance.value / 1000;
                // Tu tarifa de B/. 1.50 mínimo
                let precio = 1.50 + (km * 0.60);
                if (precio < 1.75) precio = 1.75; 
                document.getElementById('precio-txt').innerText = "B/. " + precio.toFixed(2);
                document.getElementById('info-viaje').style.display = "block";
            }
        });
    }

    function confirmarPedido() {
        const tel = localStorage.getItem('userCel');
        if(!tel) return alert("Inicia sesión");
        const ref = db.ref('viajes').push({
            cliente: localStorage.getItem('userName') || "Cliente",
            telefono: tel,
            precio: document.getElementById('precio-txt').innerText.replace("B/. ", ""),
            estado: "buscando",
            origen: document.getElementById('origen-input').value,
            destino: document.getElementById('destino-input').value
        });
        viajeID = ref.key;
        document.getElementById('panel-cliente').style.display = "none";
        document.getElementById('panel-espera').style.display = "block";
    }

    function cancelarViaje() { location.reload(); }

    window.onload = initMap;
</script>
</body>
</html>
