<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PreetyTaxi - Pedir Viaje</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg&libraries=places"></script>
    <style>
        /* MANTENGO TODO TU CSS ORIGINAL IGUAL */
        html { overflow: hidden; height: 100%; background-color: #000; }
        body { margin: 0; padding: 0; height: 101%; width: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden !important; position: fixed; background: #000; color: #fff; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, #000 85%, transparent); padding: 20px; box-sizing: border-box; z-index: 10; border-radius: 30px 30px 0 0; }
        .box { background: #1a1a1a; padding: 15px; border-radius: 20px; border: 1px solid #333; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; font-size: 16px; }
        
        .btn-pedir { background: #ffc107; color: #000; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .tarifa-box { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding: 0 10px; }
        .price { color: #ffc107; font-size: 24px; font-weight: bold; }
        
        /* Estilo para el buscador de destinos */
        .suggestions { background: #222; border-radius: 10px; max-height: 150px; overflow-y: auto; margin-top: -5px; display: none; border: 1px solid #444; }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .suggestion-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="overlay" id="panel-cliente">
    <div class="box">
        <input type="text" id="origen" placeholder="📍 ¿Dónde te buscamos?" readonly>
        <input type="text" id="destino" placeholder="🏁 ¿A dónde vas?" oninput="buscarDestino(this.value)">
        <div id="lista-sugerencias" class="suggestions"></div>
    </div>

    <div class="tarifa-box">
        <span>Precio Estimado</span>
        <span class="price">B/. <span id="tarifa-final">1.50</span></span>
    </div>

    <button class="btn-pedir" onclick="solicitarTaxi()">PEDIR PREETYTAXI 🚕</button>
</div>

<div class="overlay" id="panel-espera" style="display:none; text-align:center;">
    <h2 id="status-label">Buscando Chofer...</h2>
    <div class="box" id="datos-conductor" style="display:none;">
        <h3 id="nombre-ch">Nombre</h3>
        <p id="placa-ch">Placa</p>
    </div>
    <button class="btn-pedir" style="background:#cc0000; color:white;" onclick="cancelarViaje()">CANCELAR PEDIDO</button>
</div>

<script>
    // CONFIGURACIÓN FIREBASE (Mantenemos la tuya)
    const firebaseConfig = { 
        apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
        databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DATOS DE TU PDF (Los 100 puntos principales)
    const tarifario = {
        "ALBROOK MALL": 10.00,
        "ALBROOK TERMINAL": 10.00,
        "BRISAS HASTA LA 36": 1.50,
        "OCCIDENTE HASTA LA 35": 1.50,
        "BRISAS DESPUES DE LA 36": 1.75,
        "OCCIDENTE DESPUES DE LA 35": 1.75,
        "CONDADO DEL REY": 9.00,
        "COSTA DEL ESTE": 7.50,
        "EL CRISOL": 3.65,
        "VERSALLES": 5.00,
        "METROMALL": 3.50,
        "AEROPUERTO TOCUMEN": 12.00,
        "VIA ESPAÑA": 10.00,
        "PAITILLA": 10.00,
        "COSTA SUR": 7.50,
        "PANAMA VIEJO": 9.00,
        "PARADOR": 3.50,
        "DON BOSCO": 4.00,
        "LOS PUEBLOS": 3.50
        // Podrás agregar más desde el Admin
    };

    let viajeID = null;
    let miNombre = localStorage.getItem('userName');
    let miCel = localStorage.getItem('userCel');

    // BUSCADOR INTELIGENTE
    function buscarDestino(val) {
        const div = document.getElementById('lista-sugerencias');
        div.innerHTML = "";
        if (val.length < 2) { div.style.display = "none"; return; }

        const filtered = Object.keys(tarifario).filter(l => l.toLowerCase().includes(val.toLowerCase()));
        
        if (filtered.length > 0) {
            div.style.display = "block";
            filtered.forEach(l => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerText = l + " - B/. " + tarifario[l].toFixed(2);
                item.onclick = () => seleccionarDestino(l, tarifario[l]);
                div.appendChild(item);
            });
        } else {
            div.style.display = "none";
        }
    }

    function seleccionarDestino(lugar, precio) {
        document.getElementById('destino').value = lugar;
        document.getElementById('tarifa-final').innerText = precio.toFixed(2);
        document.getElementById('lista-sugerencias').style.display = "none";
    }

    // Inicializar Mapa visual (Sin costo de Route)
    function initMap() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const miPos = { lat: pos.coords.lat, lng: pos.coords.lng };
                const map = new google.maps.Map(document.getElementById('map'), {
                    center: miPos, zoom: 17, disableDefaultUI: true,
                    styles: [{ "elementType": "geometry", "stylers": [{ "color": "#212121" }] }] // Estilo oscuro
                });
                new google.maps.Marker({ position: miPos, map: map, icon: 'https://maps.google.com/mapfiles/ms/icons/yellow-dot.png' });
                document.getElementById('origen').value = "Mi Ubicación Actual";
            });
        }
    }

    function solicitarTaxi() {
        const dest = document.getElementById('destino').value;
        const precio = document.getElementById('tarifa-final').innerText;
        
        if(!dest || dest === "") return alert("Por favor selecciona un destino de la lista.");

        const ref = db.ref('viajes').push();
        ref.set({
            cliente: miNombre,
            celular: miCel,
            origen: "Ubicación GPS",
            destino: dest,
            monto: precio,
            estado: "esperando",
            fecha: new Date().toLocaleString()
        });
        viajeID = ref.key;
        document.getElementById('panel-cliente').style.display = "none";
        document.getElementById('panel-espera').style.display = "block";
        escuchar();
    }

    // Mantenemos tu función de escuchar cambios igual
    function escuchar() {
        db.ref('viajes/' + viajeID).on('value', snap => {
            const v = snap.val();
            if(!v) return;
            if(v.estado === "en curso") {
                document.getElementById('status-label').innerText = "🚕 ¡CHOFER EN CAMINO!";
                document.getElementById('datos-conductor').style.display = "block";
                document.getElementById('nombre-ch').innerText = v.conductorNombre;
                document.getElementById('placa-ch').innerText = "PLACA: " + v.conductorPlaca;
            }
            if(v.estado === "completado") {
                alert("Viaje finalizado. ¡Gracias por usar PreetyTaxi!");
                location.reload();
            }
        });
    }

    function cancelarViaje() {
        if (viajeID) db.ref('viajes/' + viajeID).update({ estado: 'cancelado' }).then(() => location.reload());
    }

    window.onload = initMap;
</script>

</body>
</html>
