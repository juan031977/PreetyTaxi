<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PreetyTaxi - Pedir Viaje</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #ffc107; --dark: #000; --card: #1a1a1a; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .map-header { width: 100%; height: 200px; background-image: url('https://images.unsplash.com/photo-1593351415075-3bac9f45c877?auto=format&fit=crop&q=80&w=800'); background-size: cover; background-position: center; border-bottom: 3px solid var(--gold); }
        .container { width: 90%; max-width: 400px; margin-top: -30px; position: relative; z-index: 10; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.8); text-align: center; }
        .logo-text { color: var(--gold); font-size: 24px; font-weight: bold; }
        label { display: block; margin-top: 15px; color: #aaa; font-size: 13px; text-align: left; }
        select, input { width: 100%; padding: 15px; margin-top: 5px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; font-size: 16px; box-sizing: border-box; }
        .price-display { background: #222; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px dashed var(--gold); }
        .price-display span { font-size: 30px; font-weight: bold; color: var(--gold); }
        .btn-pedir { background: var(--gold); color: black; width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
        #panel-espera { display: none; }
        .loader { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-whatsapp { display: block; background: #25d366; color: white; padding: 15px; border-radius: 10px; text-decoration: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="map-header"></div>

<div class="container">
    <div id="panel-cliente" class="card">
        <p class="logo-text">🚕 PreetyTaxi</p>
        <label>PUNTO DE RECOGIDA:</label>
        <input type="text" id="origen" value="Plaza del Golf (Punto 0)">
        <label>DESTINO:</label>
        <select id="select-destino" onchange="actualizarPrecio()">
            <option value="0">-- Seleccionar --</option>
            <option value="1.25">Angel Rubio - B/. 1.25</option>
            <option value="1.50">Brisas hasta la 36 - B/. 1.50</option>
            <option value="1.75">Brisas después 36 - B/. 1.75</option>
            <option value="2.50">Alpes/Everest - B/. 2.50</option>
            <option value="3.50">Metromall - B/. 3.50</option>
        </select>
        <div class="price-display"><span>B/. 0.00</span></div>
        <button class="btn-pedir" onclick="pedirTaxi()">SOLICITAR AHORA</button>
    </div>

    <div id="panel-espera" class="card">
        <div id="buscando-ui">
            <h2 style="color:var(--gold)">Buscando Taxi...</h2>
            <div class="loader"></div>
        </div>
        <div id="datos-conductor" style="display:none;">
            <h2 style="color:var(--gold)">¡Taxi en camino!</h2>
            <h3 id="nombre-ch">---</h3>
            <p id="placa-ch">Placa: ---</p>
            <a id="link-ws" href="#" class="btn-whatsapp">CONTACTAR CONDUCTOR</a>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
        databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function actualizarPrecio() {
        const p = document.getElementById('select-destino').value;
        document.querySelector('.price-display span').innerText = "B/. " + parseFloat(p).toFixed(2);
    }

    function pedirTaxi() {
        const origen = document.getElementById('origen').value;
        const select = document.getElementById('select-destino');
        const precio = parseFloat(select.value);
        if (precio <= 0) return alert("Selecciona destino");

        const viaje = {
            cliente: localStorage.getItem('userName') || "Pasajero",
            clienteCel: (localStorage.getItem('userCel') || "").replace(/\D/g, ''),
            origen: origen,
            destino: select.options[select.selectedIndex].text,
            precio: precio,
            estado: 'pendiente',
            timestamp: new Date().getTime()
        };

        const ref = db.ref('viajes').push(viaje);
        document.getElementById('panel-cliente').style.display = "none";
        document.getElementById('panel-espera').style.display = "block";

        ref.on('value', snap => {
            const v = snap.val();
            if(v && v.estado === "en curso") {
                document.getElementById('buscando-ui').style.display = "none";
                document.getElementById('datos-conductor').style.display = "block";
                document.getElementById('nombre-ch').innerText = v.conductorNombre;
                document.getElementById('placa-ch').innerText = "PLACA: " + v.conductorPlaca;

                // LÓGICA DE WHATSAPP REFORZADA
                let cel = String(v.conductorCel || "").replace(/\D/g, '');
                if(cel.length === 8) cel = "507" + cel;
                
                const link = document.getElementById('link-ws');
                const mensaje = encodeURIComponent("¡Hola! Soy tu pasajero en " + v.origen);
                
                link.onclick = function(e) {
                    if(cel.length < 8) {
                        e.preventDefault();
                        alert("Error: El chofer no tiene su celular registrado correctamente en su panel.");
                    }
                };
                link.href = "https://wa.me/" + cel + "?text=" + mensaje;
            }
            if(v && v.estado === "completado") { location.reload(); }
        });
    }
</script>
</body>
</html>
