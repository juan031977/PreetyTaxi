        :root { --gold: #ffc107; --dark: #000; --card: #1a1a1a; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        .map-header {
            width: 100%; height: 180px;
            background-image: url('https://images.unsplash.com/photo-1593351415075-3bac9f45c877?auto=format&fit=crop&q=80&w=800');
            background-size: cover; background-position: center;
            position: relative; border-bottom: 3px solid var(--gold);
        }
        .container { width: 92%; max-width: 400px; margin-top: -30px; position: relative; z-index: 10; padding-bottom: 40px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        
        .logo-text { color: var(--gold); font-size: 24px; font-weight: bold; text-align: center; margin: 0 0 20px 0; }
        label { display: block; margin-top: 15px; color: #aaa; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px; margin-top: 5px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Estilo del Buscador */
        .search-box {
            border: 1px solid var(--gold) !important;
            background: #2a2a2a !important;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .price-display { background: #111; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; border: 1px dashed var(--gold); }
        .price-display span { font-size: 32px; font-weight: bold; color: var(--gold); }
        .btn-pedir { background: var(--gold); color: black; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
        .btn-cancelar { background: transparent; color: #ff4444; width: 100%; padding: 12px; border: 1px solid #ff4444; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        #panel-espera { display: none; text-align: center; padding: 30px; }
        .loader { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* === FLECHA DE RETROCESO === */
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #ffc107; 
            text-decoration: none; 
            font-size: 26px; 
            font-weight: bold;

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1c5lxn2ehGS_Wo5Htbkwi0gUcdpauiMg",
        databaseURL: "https://preetytaxiapp-default-rtdb.firebaseio.com/"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let viajeID = "";
    
    let latPasajero = null;
    let lonPasajero = null;

    function filtrarDestinos() {
        const input = document.getElementById('input-busqueda').value.toLowerCase();
        const select = document.getElementById('select-destino');
        const opciones = select.getElementsByTagName('option');
        for (let i = 0; i < opciones.length; i++) {

        }
    }
    function actualizarPrecio() {
        const p = document.getElementById('select-destino').value;
        document.getElementById('display-precio').innerText = "B/. " + parseFloat(p).toFixed(2);
    }

    // Fórmula matemática Haversine para calcular distancia exacta en KM
    function calcularDistanciaKM(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; 
    }

    // Obtiene el GPS del pasajero primero antes de listar
    function procesarUbicacionYBuscar() {
        const select = document.getElementById('select-destino');
        const precio = parseFloat(select.value);
        if (precio <= 0 || isNaN(precio)) return alert("Selecciona un destino de la lista.");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                latPasajero = position.coords.latitude;
                lonPasajero = position.coords.longitude;
                buscarConductoresCercanos(latPasajero, lonPasajero);
            }, (error) => {
                alert("Aviso: El navegador bloqueó el GPS directo. Se usará la ubicación base de Brisas del Golf para el rastreo de 20 km.");
                latPasajero = 9.0436;
                lonPasajero = -79.4449;
                buscarConductoresCercanos(latPasajero, lonPasajero);
            });
        } else {
            alert("Tu navegador no soporta geolocalización.");
        }
    }

    // Descarga de Firebase, filtra a un radio de 20km y ordena del más cercano al más lejano
    function buscarConductoresCercanos(latPas, lonPas) {
        const contenedor = document.getElementById("contenedor-conductores");
        const listaDiv = document.getElementById("lista-renderizada");
        
        listaDiv.innerHTML = "<p style='color: var(--gold); text-align:center;'>Buscando conductores en el área...</p>";
        contenedor.style.display = "block";

        db.ref('conductores').once('value', (snapshot) => {
            let conductoresValidos = [];

            if (!snapshot.exists()) {
                listaDiv.innerHTML = "<p style='color: #ff4444; text-align:center; font-size:14px; padding:10px;'>⚠️ No hay ningún conductor registrado en la base de datos.</p>";
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const chofer = childSnapshot.val();
                
                // Filtra solo choferes que estén con el estado "activo" y tengan coordenadas registradas
                if (chofer.estado === "activo" && chofer.lat && chofer.lon) {
                    const distancia = calcularDistanciaKM(latPas, lonPas, parseFloat(chofer.lat), parseFloat(chofer.lon));
                    
                    // REGLA NUEVA: Radio máximo ampliado a 20 Kilómetros
                    if (distancia <= 20) {
                        conductoresValidos.push({
                            idCelular: childSnapshot.key,
                            nombre: chofer.nombre || "Conductor",
                            placa: chofer.placa || "---",
                            foto: chofer.foto || "https://cdn-icons-png.flaticon.com/512/1395/1395855.png",
                            distancia: distancia
                        });
                    }
                }
            });

            // REGLA: Ordenamiento dinámico automático (De menor distancia a mayor distancia)
            conductoresValidos.sort((a, b) => a.distancia - b.distancia);

            listaDiv.innerHTML = ""; 

            if (conductoresValidos.length === 0) {
                listaDiv.innerHTML = `
                    <div style='color: #ff4444; text-align:center; font-size:14px; padding:15px; background:#222; border-radius:10px; border: 1px dashed red;'>
                        <p style='margin:0 0 10px 0;'>⚠️ No se encontraron conductores activos a menos de 20 km.</p>
                        <small style='color:#aaa; display:block;'>Revisa que el conductor tenga en Firebase:</small>
                        <small style='color:var(--gold); display:block;'>estado: "activo"</small>
                        <small style='color:var(--gold); display:block;'>lat y lon con coordenadas válidas</small>
                    </div>`;
                return;
            }

            // Renderiza las tarjetas de los choferes encontrados ordenados (El más cercano arriba)
            conductoresValidos.forEach((chofer) => {
                listaDiv.innerHTML += `
                    <div class="conductor-tarjeta">
                        <img src="${chofer.foto}">
                        <div class="conductor-info">
                            <h4>${chofer.nombre}</h4>
                            <p>🚗 Placa: ${chofer.placa}</p>
                            <span class="distancia-badge">A ${chofer.distancia.toFixed(1)} km</span>
                        </div>
                        <button class="btn-elegir-ch" onclick="pedirTaxiConChofer('${chofer.idCelular}', '${chofer.nombre}', '${chofer.placa}')">
                            Elegir 🚕
                        </button>
                    </div>
                `;
            });
        });
    }

    // El pedido se realiza asignando directamente los datos del chofer que seleccionó el usuario
    function pedirTaxiConChofer(choferCelular, choferNombre, choferPlaca) {
        const origen = document.getElementById('origen').value;
        const select = document.getElementById('select-destino');
        const precio = parseFloat(select.value);
        const destino = select.options[select.selectedIndex].text;
        
        const viaje = {
            cliente: localStorage.getItem('userName') || "Pasajero",
            clienteCel: localStorage.getItem('userCel') || "",
            origen: origen,
            destino: destino,
            precio: precio,
            estado: 'en curso', 
            conductorCel: choferCelular,
            conductorNombre: choferNombre,
            conductorPlaca: choferPlaca,
            timestamp: new Date().getTime()
        };
        
        const ref = db.ref('viajes').push(viaje);
        viajeID = ref.key;
        
        document.getElementById('panel-cliente').style.display = "none";
        document.getElementById('panel-espera').style.display = "block";
        
        document.getElementById('buscando-ui').style.display = "none";
        document.getElementById('datos-conductor').style.display = "block";
        document.getElementById('nombre-ch').innerText = choferNombre;
        document.getElementById('placa-ch').innerText = "PLACA: " + choferPlaca;
        document.getElementById('link-ws').href = `https://wa.me/${choferCelular}`;

        ref.on('value', snap => {
            const v = snap.val();
            if(!v) return;
            if(v.estado === "cancelado" || v.estado === "completado") location.reload();
        });
    }

    function pedirTaxi() {
        procesarUbicacionYBuscar();
    }

    function cancelarPedidoTotal() {
        if(viajeID && confirm("¿Cancelar viaje?")) {
            db.ref('viajes/' + viajeID).update({ estado: 'cancelado' }).then(() => location.reload());
        } else if (!viajeID) {
            location.reload();
        }
    }
</script>
</body>
</html>
